name: Build and deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -o ${{ github.workspace }}/publish --no-build

      - name: Bundle ffmpeg static binary (Linux x64)
        run: |
          set -eo pipefail
          DEST=${{ github.workspace }}/publish/bin
          mkdir -p "$DEST"
          cd /tmp

          # App Service Linux ships no ffmpeg, so we bundle a self-contained build.
          # The previous apt fallback shipped an ffmpeg linked against its OWN shared
          # libraries (libavdevice.so.60, ...) which are absent on App Service, causing
          # "error while loading shared libraries" (exit 127). We therefore require a
          # build that depends on nothing beyond the standard glibc/system libraries.

          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"

          # johnvansickle: fully static (zero deps). Occasionally rejects automated
          # requests (HTTP 415/HTML), so send a browser UA and validate magic bytes.
          fetch_johnvansickle() {
            local url="$1"
            curl -fsSL -A "$UA" --retry 3 --retry-delay 5 --max-time 120 "$url" -o jvs.tar.xz || return 1
            file jvs.tar.xz | grep -q "XZ compressed data" || return 1
            tar -xf jvs.tar.xz || return 1
            local dir; dir=$(ls -d ffmpeg-*-amd64-static 2>/dev/null | head -1) || return 1
            [ -n "$dir" ] && cp "$dir/ffmpeg" "$DEST/ffmpeg"
          }

          # BtbN (GitHub releases — highly available). Linked only against glibc, with
          # ffmpeg's own libraries compiled in, so it runs on App Service unmodified.
          fetch_btbn() {
            local url="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
            curl -fsSL -A "$UA" --retry 3 --retry-delay 5 --max-time 180 "$url" -o btbn.tar.xz || return 1
            file btbn.tar.xz | grep -q "XZ compressed data" || return 1
            tar -xf btbn.tar.xz || return 1
            local dir; dir=$(ls -d ffmpeg-master-latest-linux64-gpl 2>/dev/null | head -1) || return 1
            [ -n "$dir" ] && cp "$dir/bin/ffmpeg" "$DEST/ffmpeg"
          }

          ok=""
          for url in \
            "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" \
            "https://www.johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          do
            echo "trying johnvansickle: $url"
            if fetch_johnvansickle "$url"; then ok=1; echo "got johnvansickle static build"; break; fi
            sleep 5
          done
          if [ -z "$ok" ]; then
            echo "johnvansickle unavailable; falling back to BtbN build"
            if fetch_btbn; then ok=1; echo "got BtbN build"; fi
          fi
          [ -n "$ok" ] || { echo "ERROR: could not obtain ffmpeg from any source"; exit 1; }

          chmod +x "$DEST/ffmpeg"

          # Gate: the only fatal case is depending on ffmpeg's OWN shared libraries
          # (libav*/libsw*/libpostproc) or any library missing on the build host.
          # A fully static binary (ldd: "not a dynamic executable") trivially passes,
          # as does a glibc-only build (libc/libm/libpthread/... exist on App Service).
          DEPS=$(ldd "$DEST/ffmpeg" 2>&1 || true)
          echo "ldd:"; echo "$DEPS"
          if echo "$DEPS" | grep -qiE "libav|libsw|libpostproc"; then
            echo "ERROR: ffmpeg depends on its own shared libs (not self-contained) — would fail on App Service"
            exit 1
          fi
          if echo "$DEPS" | grep -qi "not found"; then
            echo "ERROR: ffmpeg has unresolved shared-library dependencies"
            exit 1
          fi
          echo "verified: ffmpeg is self-contained (static or glibc-only)"
          "$DEST/ffmpeg" -version | head -2

      - name: Bundle yt-dlp (YouTube / social-video downloader)
        run: |
          set -eo pipefail
          DEST=${{ github.workspace }}/publish/bin
          # yt-dlp ships as a single statically-linked Python-bundled binary.
          # We download the latest stable Linux x86_64 release from GitHub.
          YT_URL="https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux"
          echo "Downloading yt-dlp from $YT_URL"
          curl -fsSL --retry 3 --retry-delay 5 --max-time 120 "$YT_URL" -o "$DEST/yt-dlp" || {
            echo "WARNING: yt-dlp download failed; YouTube download feature will be unavailable"
            exit 0   # non-fatal — Animate tab shows a clear error without it
          }
          chmod +x "$DEST/yt-dlp"
          echo "yt-dlp bundled: $($DEST/yt-dlp --version 2>/dev/null | head -1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: ./publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish

      - name: Azure logout
        run: az logout
        if: always()
