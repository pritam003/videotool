name: Build and deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -o ${{ github.workspace }}/publish --no-build

      - name: Bundle ffmpeg static binary (Linux x64)
        run: |
          set -e
          mkdir -p ${{ github.workspace }}/publish/bin
          cd /tmp
          # The johnvansickle.com mirror occasionally returns an HTML error page instead
          # of the tarball. Retry with backoff, validate magic bytes, and fall back to
          # the apt-installed ffmpeg if the download stays broken.
          download_ffmpeg() {
            for url in \
              "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" \
              "https://www.johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
            do
              for i in 1 2 3; do
                echo "attempt $i: $url"
                if curl -fsSL --retry 3 --retry-delay 5 --max-time 90 "$url" -o ffmpeg.tar.xz \
                   && file ffmpeg.tar.xz | grep -q "XZ compressed data"; then
                  return 0
                fi
                sleep 5
              done
            done
            return 1
          }
          if download_ffmpeg; then
            tar -xf ffmpeg.tar.xz
            DIR=$(ls -d ffmpeg-*-amd64-static | head -1)
            cp "$DIR/ffmpeg" ${{ github.workspace }}/publish/bin/ffmpeg
          else
            echo "Static ffmpeg download failed; falling back to apt ffmpeg."
            sudo apt-get update -qq
            sudo apt-get install -y ffmpeg
            cp "$(command -v ffmpeg)" ${{ github.workspace }}/publish/bin/ffmpeg
          fi
          chmod +x ${{ github.workspace }}/publish/bin/ffmpeg
          ${{ github.workspace }}/publish/bin/ffmpeg -version | head -2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: ./publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish

      - name: Azure logout
        run: az logout
        if: always()
