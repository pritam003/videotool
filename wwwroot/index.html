<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoTool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 48px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .content {
      margin-bottom: 32px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .feature-card {
      padding: 20px;
      background: #f5f5f5;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      background: #f0f0f0;
      border-color: #667eea;
      transform: translateY(-2px);
    }

    .feature-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .feature-name {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .button-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      flex: 1;
      min-width: 140px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
      flex: 1;
      min-width: 140px;
    }

    .btn-secondary:hover {
      background: #f5f5f5;
    }

    .status {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #999;
    }

    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .footer-text {
      margin-top: 20px;
      font-size: 12px;
      color: #bbb;
    }

    @media (max-width: 500px) {
      .container {
        padding: 32px 24px;
      }

      h1 {
        font-size: 24px;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VideoTool</h1>
    <p class="subtitle">Create stunning videos with AI-powered storytelling</p>

    <div class="content">
      <div class="feature-grid">
        <div class="feature-card">
          <div class="feature-icon">🎬</div>
          <div class="feature-name">Story Generation</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🎨</div>
          <div class="feature-name">Visual Rendering</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🎙️</div>
          <div class="feature-name">Voice Narration</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">✨</div>
          <div class="feature-name">AI Enhancement</div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-primary" onclick="handleCreateVideo()">✨ Create Video</button>
        <button class="btn-secondary" onclick="handleBrowse()">📚 Browse</button>
      </div>
    </div>

    <div class="status">
      <span class="dot"></span>
      Service Status: <strong>Ready</strong>
    </div>

    <p class="footer-text">
      Powered by Azure OpenAI • VideoTool v2.0
    </p>
  </div>

  <script>
    function handleCreateVideo() {
      console.log('Create video clicked');
      alert('Create video feature coming soon!');
    }

    function handleBrowse() {
      console.log('Browse clicked');
      alert('Browse feature coming soon!');
    }

    // Health check
    fetch('/health')
      .then(r => r.json())
      .then(d => console.log('Service health:', d))
      .catch(e => console.error('Health check failed:', e));
  </script>
</body>
</html>
