  // Render a still image from text: a 1s T2V clip whose last frame we extract +
  // normalise + push into ComfyUI as a reusable start image. Returns {name, previewUrl}.
  async function renderStillFromText(thePrompt, label) {
    const job = await submitT2V(thePrompt, 1, label);
    pushSubscribeForJob(job.id, label);
    await poll(job.id, (st, elapsed) => {
      setStatus(s => ({ ...s, label: `${label}: ${st} (${Math.round(elapsed / 1000)}s)` }));
    });
    const fr = await fetch(`/api/jobs/${job.id}/finalize`, { method: "POST" });
    const fj = await jsonOrThrow(fr);
    const ef = await fetch("/api/extract-last-frame", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ videoUrl: fj.url, size: scSize })
    });
    const ej = await jsonOrThrow(ef);
    return { name: ej.name, previewUrl: ej.previewUrl };
  }

  // Render a clean portrait with FLUX.1 Schnell on the A100 (fast, sharp, a few seconds).
  // Same {name, previewUrl} shape as the Wan still, so it drops straight into casting.
  // Tolerates GPU cold start; throws a fluxUnavailable error for any other failure
  // (e.g. the FLUX checkpoint isn't staged on the share yet) so callers can fall back.
  async function fluxPortrait(thePrompt, label) {
    for (let attempt = 0; attempt < 40; attempt++) {
      if (cancelRef.current) throw new Error("Cancelled by user");
      const r = await fetch("/api/flux-image", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: thePrompt, size: scSize })
      });
      if (r.ok) { const j = await r.json(); return { name: j.name, previewUrl: j.previewUrl }; }
      const txt = await r.text();
      let warming = false; try { warming = !!JSON.parse(txt).warming; } catch {}
      if (r.status === 503 && (warming || /warming|cold start|50[234]|ActivationFailed|no capacity/i.test(txt))) {
        setStatus(s => ({ ...s, label: `${label}: GPU warming up… (try ${attempt + 1})` }));
        await sleep(15000); continue;
      }
      const e = new Error("flux: " + txt.slice(0, 200)); e.fluxUnavailable = true; throw e;
    }
    const e = new Error("GPU did not become ready for FLUX"); e.fluxUnavailable = true; throw e;
  }

  // Portrait with graceful degradation: FLUX.1 Schnell first; if it isn't available
  // (weights not staged, node error, …) fall back to the slower 1s Wan T2V still so
  // casting never hard-fails just because FLUX isn't ready.
  async function renderPortrait(thePrompt, label) {
    // ComfyUI still engine: the original Wan 1s-T2V → last-frame path (always available).
    if (scImageEngine === "comfy") return await renderStillFromText(thePrompt, label);
    // FLUX engine: FLUX.1 Schnell first, with a graceful fallback to the Wan still so
    // casting never hard-fails just because FLUX hit an error.
    try { return await fluxPortrait(thePrompt, label); }
    catch (e) {
      if (cancelRef.current || /Cancelled by user/i.test(e.message || "")) throw e;
      dbg("warn", `${label}: FLUX unavailable (${(e.message || "").slice(0, 80)}) — falling back to ComfyUI still`);
      return await renderStillFromText(thePrompt, label);
    }
  }

  // Upload a user-provided image as a canonical character reference (tolerates GPU cold start).
  async function uploadCharImage(file, label) {
    for (let attempt = 0; attempt < 40; attempt++) {
      if (cancelRef.current) throw new Error("Cancelled by user");
      const cfd = new FormData(); cfd.append("image", file); cfd.append("size", scSize);
      const cr = await fetch("/api/comfy-image", { method: "POST", body: cfd });
      if (cr.ok) { const j = await cr.json(); return { name: j.name, previewUrl: j.previewUrl }; }
      const txt = await cr.text();
      let warming = false; try { warming = !!JSON.parse(txt).warming; } catch {}
      if (cr.status === 503 || warming || /warming|50[234]|timeout|ActivationFailed|no capacity/i.test(txt)) {
        setStatus(s => ({ ...s, label: `${label}: GPU warming up… (try ${attempt + 1})` }));
        await sleep(15000); continue;
      }
      throw new Error("character image upload failed: " + txt.slice(0, 300));
    }
    throw new Error("GPU did not become ready to accept the image — try again.");
  }

  // Predefined, production-safe cast archetypes. The user can drop one in as a new
  // character, use one to overwrite an existing character, or just type their own
  // description manually — all three flows feed the same editable scCast list.
  const CAST_TEMPLATES = [
    { label: "Young man", name: "Young man", description: "a man in his mid-20s, athletic build, warm brown skin, short black hair, expressive dark eyes, light stubble, wearing a casual jacket and jeans" },
    { label: "Young woman", name: "Young woman", description: "a woman in her mid-20s, slim build, light brown skin, long dark wavy hair, bright eyes, wearing a simple blouse and jeans" },
    { label: "Middle-aged man", name: "Man", description: "a man in his 40s, sturdy build, medium skin tone, neat salt-and-pepper hair, calm steady eyes, wearing a plain collared shirt" },
    { label: "Middle-aged woman", name: "Woman", description: "a woman in her 40s, average build, medium skin tone, dark hair tied back, kind eyes, wearing a simple kurta" },
    { label: "Elderly man", name: "Old man", description: "a man in his 70s, lean and slightly stooped, weathered tan skin, thin grey hair and a short white beard, gentle tired eyes, wearing a worn shawl" },
    { label: "Elderly woman", name: "Old woman", description: "a woman in her 70s, small frame, soft wrinkled skin, silver hair in a neat bun, warm eyes, wearing a draped sari" },
    { label: "Little girl", name: "Girl", description: "a girl about 7 years old, small, round cheeks, dark hair in two braids, curious bright eyes, wearing a bright cotton dress" },
    { label: "Little boy", name: "Boy", description: "a boy about 8 years old, skinny, tousled dark hair, a gap-toothed grin, wearing a striped t-shirt and shorts" },
    { label: "Businesswoman", name: "Executive", description: "a woman in her late 30s, poised, medium skin tone, sleek dark hair in a low bun, sharp confident eyes, wearing a tailored charcoal suit" },
    { label: "Businessman", name: "Executive", description: "a man in his 40s, solid build, olive skin, neatly combed hair, serious expression, wearing a navy suit and tie" },
  ];

  // Append a new character to the editable cast (optionally pre-filled from a template).
  function addCastMember(partial) {
    setScCast(p => {
      const base = Array.isArray(p) ? p : [];
      let id = (partial && partial.id) || `char${base.length + 1}`;
      while (base.some(c => c.id === id)) id += "x";
      return [...base, {
        id,
        name: (partial && partial.name) || "New character",
        description: (partial && partial.description) || "",
        voice: "", refName: null, previewUrl: null, status: "idle"
      }];
    });
  }
  // Patch one cast member (name / description / voice). Editing the look clears its
  // rendered reference so the user re-casts that character with the new description.
  function updateCastMember(id, patch) {
    const invalidates = ("name" in patch) || ("description" in patch);
    setScCast(p => (p || []).map(c => c.id === id
      ? { ...c, ...patch, ...(invalidates && (c.refName) ? { refName: null, previewUrl: null, status: "idle" } : {}) }
      : c));
  }
  function removeCastMember(id) {
    setScCast(p => (p || []).filter(c => c.id !== id));
  }

  // Build the text prompt that renders a clean canonical portrait for one character.
  function castSnapshotPrompt(c, story) {
    const look = (c.description || "").trim();
    return `Cinematic full-body character portrait of ${c.name || "the character"}: ${look}. Single subject, standing, facing camera, neutral seamless studio backdrop, soft even key light, sharp focus, photorealistic, accurate human anatomy and proportions. ${(story && story.style) || ""}. No on-screen text, captions, or watermarks.`;
  }

  // Infer a character's likely gender from its name + description so we can suggest a
  // fitting voice. Returns "female" | "male" | "" (unknown/neutral).
  function inferGender(c) {
    const t = `${c.name || ""} ${c.description || ""}`.toLowerCase();
    const f = /\b(woman|women|girl|girls|lady|ladies|she|her|hers|mother|mom|mum|mommy|wife|daughter|sister|aunt|auntie|grandmother|grandma|granny|actress|queen|princess|businesswoman|madam|miss|mrs|ms|female|feminine|heroine|widow|bride|niece)\b/.test(t);
    const m = /\b(man|men|boy|boys|guy|gentleman|he|his|him|father|dad|daddy|husband|son|brother|uncle|grandfather|grandpa|king|prince|businessman|sir|mr|male|masculine|hero|widower|groom|nephew)\b/.test(t);
    return f && !m ? "female" : m && !f ? "male" : "";
  }

  // Pick a distinct voice for one character from a candidate pool, matching gender when
  // known and avoiding voices already taken by other characters / the narrator.
  function suggestVoiceForCharacter(c, pool, used) {
    if (!pool.length) return "";
    const want = inferGender(c);
    let cands = pool.filter(v => !used.has(v.shortName));
    if (want) { const g = cands.filter(v => v.gender === want); if (g.length) cands = g; }
    if (!cands.length) cands = pool.filter(v => !used.has(v.shortName));
    if (!cands.length) cands = pool;
    const pick = cands[0];
    used.add(pick.shortName);
    return pick.shortName;
  }

  // Auto-suggest a distinct per-character voice for the whole cast, in the narrator's
  // language. Respects any voice the user already chose; only fills the blanks.
  function suggestCastVoices(list) {
    if (!Array.isArray(list) || !list.length || !voices.length) return list;
    const loc = String(voice || "en-US").split("-").slice(0, 2).join("-"); // e.g. "hi-IN"
    const lang2 = String(voice || "en").split("-")[0];                     // e.g. "hi"
    let pool = voices.filter(v => v.locale === loc);
    if (pool.length < 2) pool = voices.filter(v => (v.locale || "").startsWith(lang2 + "-"));
    if (pool.length < 2) pool = voices.slice();
    pool = pool.slice().sort((a, b) => voiceRank(a) - voiceRank(b)); // prefer the most natural voices for every character
    const used = new Set();
    if (voice) used.add(voice); // keep character voices distinct from the narrator's
    return list.map(c => {
      if (c.voice) { used.add(c.voice); return c; }
      return { ...c, voice: suggestVoiceForCharacter(c, pool, used) };
    });
  }

  // Clear and re-roll all character-voice suggestions (the "↻ Re-suggest" button).
  function resuggestVoices() {
    if (scStory) voiceSuggestStoryRef.current = scStory;
    setScCast(prev => suggestCastVoices((prev || []).map(c => ({ ...c, voice: "" }))));
  }

  // Predefined voice "bundles" per language — a one-click cast of distinct voices.
  // Applying one sets the narrator to the first voice and gives every character a
  // distinct voice from the bundle (cycled). Only voices that actually exist in the
  // loaded catalogue are used.
  const VOICE_BUNDLES = {
    "en-US": [
      { label: "Warm storyteller", voices: ["en-US-AvaMultilingualNeural", "en-US-AndrewMultilingualNeural", "en-US-EmmaMultilingualNeural", "en-US-BrianMultilingualNeural"] },
      { label: "Classic studio", voices: ["en-US-JennyNeural", "en-US-GuyNeural", "en-US-AriaNeural", "en-US-DavisNeural"] },
    ],
    "en-IN": [
      { label: "Indian English (HD)", voices: ["en-IN-Aarti:DragonHDLatestNeural", "en-IN-Arjun:DragonHDLatestNeural", "en-IN-Meera:DragonHDLatestNeural", "en-IN-Neerja:DragonHDLatestNeural"] },
      { label: "Indian English", voices: ["en-IN-NeerjaNeural", "en-IN-PrabhatNeural", "en-IN-AnanyaNeural", "en-IN-AaravNeural"] },
    ],
    "hi-IN": [
      { label: "Hindi natural (HD)", voices: ["hi-IN-Kavya:MAI-Voice-2", "hi-IN-Dhruv:MAI-Voice-2", "hi-IN-Priya:MAI-Voice-2", "hi-IN-Arjun:MAI-Voice-2"] },
      { label: "Hindi classic", voices: ["hi-IN-SwaraNeural", "hi-IN-MadhurNeural", "hi-IN-AnanyaNeural", "hi-IN-AaravNeural"] },
    ],
    "bn-IN": [
      { label: "Bengali pair", voices: ["bn-IN-TanishaaNeural", "bn-IN-BashkarNeural"] },
    ],
  };
  function bundlesForCurrentLanguage() {
    const loc = String(voice || "en-US").split("-").slice(0, 2).join("-");
    return VOICE_BUNDLES[loc] || [];
  }
  function applyVoiceBundle(bundle) {
    const avail = new Set(voices.map(v => v.shortName));
    const pool = (bundle.voices || []).filter(s => avail.has(s));
    if (!pool.length) { toast("That bundle isn't available for the loaded voices.", true); return; }
    setVoice(pool[0]);
    voiceSuggestStoryRef.current = scStory; // we've set voices explicitly; don't auto-overwrite
    setScCast(prev => (prev || []).map((c, i) => ({ ...c, voice: pool[i % pool.length] })));
    dbg("ok", `applied voice bundle "${bundle.label}" (${pool.length} voices)`);
    toast(`Voice bundle “${bundle.label}” applied`);
  }

  // ── Background render queue ────────────────────────────────────────────
  async function refreshJobs() {
    try {
      const r = await fetch("/api/story-jobs");
      if (r.ok) setJobs(await r.json());
    } catch { /* transient — keep last list */ }
  }
  async function cancelJob(id) {
    try { await fetch(`/api/story-jobs/${id}/cancel`, { method: "POST" }); dbg("info", `cancel requested for ${id}`); }
    catch (e) { dbg("warn", `cancel failed: ${e.message}`); }
    refreshJobs();
  }

  // ----- GPU start / stop / status (wan22 A100 render backend) -----
  async function refreshGpu() {
    try {
      const r = await fetch("/api/gpu/status");
      if (!r.ok) return;
      const s = await r.json();
      // While a start/stop we just kicked off is settling, hold the transition label until the
      // server actually reaches the target state (or 7 min passes) so the badge doesn't flicker.
      const stale = Date.now() - gpuActionAtRef.current > 7 * 60 * 1000;
      setGpuState(prev => {
        if (!stale && prev === "starting" && s.state !== "ready") return "starting";
        if (!stale && prev === "stopping" && s.state !== "stopped") return "stopping";
        return s.state || "unknown";
      });
      setGpuReplicas(s.replicas || 0);
    } catch { /* transient — keep last state */ }
  }
  async function startGpu() {
    gpuActionAtRef.current = Date.now();
    setGpuState("starting");
    try {
      const r = await fetch("/api/gpu/start", { method: "POST" });
      if (!r.ok) { toast("Couldn't start the GPU"); await refreshGpu(); return; }
      toast("Starting the GPU… (~1–2 min)");
    } catch { toast("Couldn't start the GPU"); await refreshGpu(); }
  }
  async function stopGpu() {
    gpuActionAtRef.current = Date.now();
    setGpuState("stopping");
    try {
      const r = await fetch("/api/gpu/stop", { method: "POST" });
      if (!r.ok) { toast("Couldn't stop the GPU"); await refreshGpu(); return; }
      toast("Stopping the GPU — A100 billing off");
    } catch { toast("Couldn't stop the GPU"); await refreshGpu(); }
  }

  function resetWizard() {
    setWizStep(1);
    setScStory(null); setScCast([]); setScProgress([]);
    setScCharFile(null); setScCharPreview(null); setScNarrAudio(null);
    setScPrompt(""); setScDialogPrompt("");
    setScClipAudio([]);
    voiceSuggestStoryRef.current = null;
  }

  // Submit the finalized film to the SERVER-SIDE pipeline. Returns immediately so the
  // UI is freed to compose another; the render runs in the background and shows up in
  // the queue below. This is the only place a film is dispatched.
  async function submitStoryJob() {
    if (!scStory || !Array.isArray(scStory.clips) || !scStory.clips.length) {
      toast("Generate the story first.", true); return;
    }
    const narrating = scNarrationMode !== "off";
    let cast = (scCast || []).map(c => ({
      id: c.id, name: c.name || c.id, description: c.description || "",
      voice: narrating ? (c.voice || "") : "", refName: c.refName || null
    }));
    if (!cast.length) { toast("Add at least one character first.", true); return; }

    setScCasting(true);
    try {
      // If a lead photo was uploaded, normalize it now so the worker uses that exact face.
      if (scCharFile && cast[0] && !cast[0].refName) {
        try {
          toast("Preparing your lead reference…");
          const ref = await uploadCharImage(scCharFile, "Lead");
          cast[0] = { ...cast[0], refName: ref.name };
        } catch (e) {
          dbg("warn", `lead upload failed (${e.message}); the lead will be generated instead`);
        }
      }
      const spec = {
        language: narrating ? voiceLanguage(voice) : "English",
        size: scSize,
        clipSeconds: Math.min(5, Math.max(3, Number(scStory.clipSeconds) || 5)),
        narrate: narrating,
        narratorVoice: voice,
        dialogVoice: scDialogVoice || "",
        imageEngine: scImageEngine,
        crossfade: crossfade,
        idea: scPrompt,
        story: scStory,
        cast,
        backgroundMusic: scBackgroundMusic || "",
        musicVolume: scMusicVolume || 0.5,
        soundscape: scSoundscape,
        soundscapeVolume: scSoundscapeVolume || 0.5,
        clipAudio: scClipAudio.filter(c => c.url).map(c => ({ index: c.index, url: c.url, durationSeconds: c.dur || 0 }))
      };
      const r = await fetch("/api/story-jobs", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(spec)
      });
      const j = await jsonOrThrow(r);
      dbg("ok", `film queued: ${j.id} — "${scStory.title || "film"}"`);
      toast(`Queued “${scStory.title || "film"}” 🎬 — rendering in the background`);
      await refreshJobs();
      resetWizard();
    } catch (e) {
      toast("Submit failed: " + e.message.slice(0, 160), true);
    } finally { setScCasting(false); }
  }

  // Wizard step gating: which steps are reachable right now.
  const wizCanNext = {
    1: () => !!scPrompt.trim(),
    2: () => true,
    3: () => !!(scStory && Array.isArray(scStory.clips) && scStory.clips.length),
    4: () => true,
    5: () => true, // Sound step: always passable — user can proceed to render even without previewing
  };
  function wizNext() { if (wizStep < 6 && (wizCanNext[wizStep] ? wizCanNext[wizStep]() : true)) setWizStep(wizStep + 1); }
  function wizBack() { if (wizStep > 1) setWizStep(wizStep - 1); }

  // ── Casting phase: generate ONE canonical reference image per character BEFORE
  //    any clip is rendered, so every clip can be seeded from a stable identity
  //    (instead of the previous clip's degrading last frame). Supports multiple
  //    characters. The lead may use your uploaded image; others render from text.
  async function generateCast() {
    if (!scStory) { toast("Build a storyboard first.", true); return; }
    // Prefer the user's edited cast (names, descriptions, templates, voices); fall back
    // to the story's cast, then to a single lead.
    let cast = (Array.isArray(scCast) && scCast.length) ? scCast
      : (Array.isArray(scStory.cast) && scStory.cast.length) ? scStory.cast
      : [{ id: "hero", name: "Lead", description: scStory.subject || scPrompt || "the main subject" }];
    cancelRef.current = false; currentJobIdRef.current = null;
    setScCasting(true);
    setScCast(cast.map(c => ({ ...c, voice: c.voice || "", status: "rendering", refName: null, previewUrl: null })));
    setStatus({ phase: "running", pct: 1, label: `casting ${cast.length} character${cast.length > 1 ? "s" : ""} in parallel…` });
    try {
      // Cast every character at once (parallel) — the user's "casting happens parallely".
      // The GPU serialises actual rendering, but all snapshots are submitted together.
      await Promise.all(cast.map(async (c, i) => {
        if (cancelRef.current) throw new Error("Cancelled by user");
        let ref;
        if (i === 0 && scCharFile) ref = await uploadCharImage(scCharFile, `cast ${c.name || c.id}`);
        else ref = await renderPortrait(castSnapshotPrompt(c, scStory), `cast ${c.name || c.id}`);
        setScCast(p => p.map(x => x.id === c.id ? { ...x, status: "done", refName: ref.name, previewUrl: ref.previewUrl } : x));
        dbg("ok", `cast ready: ${c.name || c.id}`);
      }));
      setStatus({ phase: "idle", pct: 0, label: "cast ready" });
      toast(`Cast ready — ${cast.length} character${cast.length > 1 ? "s" : ""}. Review, then render the film.`);
    } catch (e) {
      const cancelled = cancelRef.current || /Cancelled by user/i.test(e.message || "");
      setStatus({ phase: cancelled ? "idle" : "failed", pct: 0, label: cancelled ? "cancelled" : "casting error" });
      toast(cancelled ? "Casting cancelled" : "Casting failed: " + e.message.slice(0, 160), !cancelled);
    } finally { setScCasting(false); }
  }

  // Regenerate one character's canonical snapshot from its locked text description.
  async function regenCast(id) {
    const c = (scCast || []).find(x => x.id === id);
    if (!scStory || !c) return;
    cancelRef.current = false; setScCasting(true);
    setScCast(p => p.map(x => x.id === id ? { ...x, status: "rendering" } : x));
    setStatus({ phase: "running", pct: 1, label: `re-casting ${c.name || c.id}…` });
    try {
      const ref = await renderPortrait(castSnapshotPrompt(c, scStory), `recast ${c.name || c.id}`);
      setScCast(p => p.map(x => x.id === id ? { ...x, status: "done", refName: ref.name, previewUrl: ref.previewUrl } : x));
      setStatus({ phase: "idle", pct: 0, label: "cast ready" });
      toast(`Re-cast ${c.name || c.id}`);
    } catch (e) {
      setScCast(p => p.map(x => x.id === id ? { ...x, status: "failed" } : x));
      toast("Re-cast failed: " + e.message.slice(0, 140), true);
    } finally { setScCasting(false); }
  }

  // Compose a clip's text prompt: prepend the LOCKED descriptions of the
  // characters present + the location, so identity is anchored in text as well
  // as in the seed image. This reinforces consistency across the whole film.
  function buildClipPrompt(clip, story, prevClip, narrating, castMap) {
    const castById = {}; (story.cast || []).forEach(c => castById[c.id] = c);
    // The user-edited cast (descriptions / templates) wins over the original story cast.
    if (castMap) Object.keys(castMap).forEach(id => { castById[id] = { ...castById[id], ...castMap[id] }; });
    const locById = {}; (story.locations || []).forEach(l => locById[l.id] = l);
    const present = (clip.characters || []).map(id => castById[id]).filter(Boolean);
    const loc = locById[clip.location];
    const who = present.map(c => `${c.name || c.id} — ${c.description || ""}`).join("; ");
    const where = loc ? `Location: ${loc.name || loc.id}, ${loc.description || ""}. ` : "";
    const idn = who ? `Featuring ${who}. ` : "";
    // Strict 5s→5s continuity: feed the PREVIOUS clip's action + spoken line so this
    // clip (whose first frame IS the previous clip's last frame) continues seamlessly.
    let cont = "";
    if (prevClip) {
      const pa = (prevClip.action || "").trim();
      cont = `This clip continues STRICTLY from the previous shot — its first frame IS the previous shot's final frame, so keep the exact same character identities, faces, wardrobe, location, lighting and camera continuity. Previously: ${pa}. Now the story moves forward: `;
    }
    const base = clip.motionPrompt || clip.action || scPrompt;
    const nLine = narrating ? (clip.narration || "").trim() : "";
    const dLine = narrating ? (clip.dialog || "").trim() : "";
    // Drive ACTING (visible speech + expression), NOT the foreign-language words themselves —
    // the exact spoken words ride the TTS audio track, so we never risk on-screen text.
    const acting = !narrating ? ""
      : dLine
        ? ` In this moment the character is speaking their line aloud — show natural, well-timed lip movement and a facial expression that matches the emotion. Never render captions, subtitles or any on-screen text.`
        : nLine
          ? ` Show the character's facial expression and emotion clearly. Never render captions, subtitles or any on-screen text.`
          : "";
    return `${idn}${where}${cont}${base}${acting}`.trim();
  }

  // Pick (single character) or compose (multiple characters) the canonical start
  // image for a clip. Single: reuse that character's reference. Multiple: render a
  // fresh establishing still from all present characters' locked descriptions so
  // they appear together in one frame for Wan I2V (which takes one start image).
  async function clipStartImage(clip, story, castMap, label) {
    const present = (clip.characters || []).filter(id => castMap[id] && castMap[id].refName);
    if (present.length === 0) {
      const any = Object.values(castMap).find(c => c.refName);
      return any ? any.refName : null;
    }
    if (present.length === 1) return castMap[present[0]].refName;
    const castById = {}; (story.cast || []).forEach(c => castById[c.id] = c);
    if (castMap) Object.keys(castMap).forEach(id => { castById[id] = { ...castById[id], ...castMap[id] }; });
    const locById = {}; (story.locations || []).forEach(l => locById[l.id] = l);
    const who = present.map(id => { const c = castById[id]; return c ? `${c.name || c.id}: ${c.description || ""}` : id; }).join(". ");
    const loc = locById[clip.location];
    const where = loc ? `${loc.name || loc.id} — ${loc.description || ""}` : (story.setting || "");
    const prompt = `Cinematic establishing wide shot showing multiple characters together in the same frame. ${who}. Setting: ${where}. ${clip.action || ""}. All characters fully visible and in-frame, photorealistic, consistent lighting, physically plausible composition. ${story.style || ""}. No on-screen text, captions, or watermarks.`;
    setStatus(s => ({ ...s, label: `${label}: composing multi-character scene…` }));
    const still = await renderPortrait(prompt, `${label} scene`);
    setScProgress(p => p.map(x => x.index === clip.index ? { ...x, startUrl: still.previewUrl } : x));
    return still.name;
  }

  // Render the film ASSET-FIRST: every clip is seeded from a CANONICAL character
  // reference (or a freshly composed multi-character still) — never the previous
  // clip's degrading last frame — and each clip's own narration line is muxed onto
  // that clip so the voiceover stays in sync. Then the narrated clips are stitched.
  async function runStoryChain() {
    if (!scStory || !Array.isArray(scStory.clips) || scStory.clips.length === 0) {
      toast("Generate a storyboard first.", true); return;
    }
    if (!scCastReady) { toast("Generate the cast first (③ Generate cast).", true); return; }
    cancelRef.current = false; currentJobIdRef.current = null;
    setRunning(true); setOuts([]); setStitched(null);
    const clips = scStory.clips;
    const N = clips.length;
    const clipSec = Math.min(5, Math.max(3, Number(scStory.clipSeconds) || 5));
    const castMap = {}; (scCast || []).forEach(c => castMap[c.id] = c);
    const narrating = scNarrationMode !== "off";
    setScProgress(clips.map(c => ({ index: c.index, title: c.title || `clip ${c.index}`, status: "pending", clipUrl: null, startUrl: null })));
    setStatus({ phase: "running", pct: 1, label: "preparing scenes" });
    const etaMin = Math.ceil((N * 70) / 60);
    toast(`Rendering ${N}-clip film · est. ~${etaMin} min on Wan2.2 I2V`);
    try {
      const finals = [];
      let prevFrameName = null, prevFramePreview = null, prevClip = null;
      for (let i = 0; i < N; i++) {
        if (cancelRef.current) throw new Error("Cancelled by user");
        const clip = clips[i];
        const label = `clip ${i + 1}/${N}`;
        const basePct = 2 + (i / N) * 92;
        const spanPct = (1 / N) * 88;
        setScProgress(p => p.map(x => x.index === clip.index ? { ...x, status: "rendering" } : x));
        setStatus({ phase: "running", pct: basePct, label: `${label}: ${clip.title || "rendering"}` });

        // Seed selection. The casting image only LOCKS THE FACE — it is NOT the start of
        // every clip. ONLY the first clip starts from the casting reference (to inject the
        // cast's generated/uploaded face). EVERY later clip starts from the PREVIOUS clip's
        // last scene/frame, so the video continues from where it left off (never restarts as
        // the portrait) while the cast keeps that same face — reinforced by the locked face
        // descriptions restated in every prompt. We only fall back to the casting reference
        // if last-frame extraction failed for the previous clip.
        let startImage, seedKind;
        if (i === 0 || !prevFrameName) {
          startImage = await clipStartImage(clip, scStory, castMap, label);
          seedKind = "casting";
          if (!startImage) throw new Error(`${label}: no character reference available — generate the cast first`);
        } else {
          startImage = prevFrameName;
          seedKind = "last-frame";
          setScProgress(p => p.map(x => x.index === clip.index ? { ...x, startUrl: prevFramePreview } : x));
        }

        const thePrompt = buildClipPrompt(clip, scStory, prevClip, narrating, castMap);
        dbg("info", `${label} seed=${seedKind}`);
        const job = await submitI2V(startImage, thePrompt, clipSec, label);
        pushSubscribeForJob(job.id, label);
        const etaMs = clipSec * 16000;
        await poll(job.id, (st, elapsed) => {
          const frac = Math.min(0.98, elapsed / etaMs);
          setStatus(s => ({ ...s, label: `${label}: ${st} (${Math.round(elapsed / 1000)}s)`, pct: basePct + spanPct * frac }));
        });
        setStatus(s => ({ ...s, label: `${label}: finalizing` }));
        const fr = await fetch(`/api/jobs/${job.id}/finalize`, { method: "POST" });
        const fj = await jsonOrThrow(fr);
        let clipUrl = fj.url;

        // Extract THIS clip's last frame (from the silent render) to seed the NEXT clip
        // — the core of the strict 5s→5s continuation chain the user asked for.
        if (i < N - 1 && !cancelRef.current) {
          try {
            const ef = await fetch("/api/extract-last-frame", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ videoUrl: clipUrl, size: scSize })
            });
            const ej = await jsonOrThrow(ef);
            prevFrameName = ej.name; prevFramePreview = ej.previewUrl;
          } catch (e) {
            dbg("warn", `${label}: last-frame extract failed (${e.message}); next clip re-seeds from casting`);
            prevFrameName = null; prevFramePreview = null;
          }
        }

        // Per-clip audio: speak the DIALOGUE (character voice) and the NARRATION (narrator
        // voice), concatenate dialogue→narration into one track, and mux it onto THIS clip so
        // the audio lands in sync with its action. Either line may be empty.
        if (narrating && !cancelRef.current) {
          const nLine = (clip.narration || "").trim();
          const dLine = (clip.dialog || "").trim();
          // Voice the dialogue in the SPEAKING character's own voice when we know who it is
          // (clip.speaker, or the sole present character), else the default character voice.
          const speakerId = clip.speaker || ((clip.characters || []).length === 1 ? clip.characters[0] : "");
          const dVoice = (speakerId && castMap[speakerId] && castMap[speakerId].voice) || scDialogVoice || voice;
          try {
            const tracks = [];
            if (dLine) {
              setStatus(s => ({ ...s, label: `${label}: dialogue` }));
              const dr = await fetch("/api/narrate", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: dLine, voice: dVoice })
              });
              tracks.push((await jsonOrThrow(dr)).url);
            }
            if (nLine) {
              setStatus(s => ({ ...s, label: `${label}: narrating` }));
              const nr = await fetch("/api/narrate", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: nLine, voice })
              });
              tracks.push((await jsonOrThrow(nr)).url);
            }
            if (tracks.length) {
              let audioUrl = tracks[0];
              if (tracks.length > 1) {
                const cr = await fetch("/api/concat-audio", {
                  method: "POST", headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ audioUrls: tracks, gapMs: 350 })
                });
                audioUrl = (await jsonOrThrow(cr)).url;
              }
              const mr = await fetch("/api/mux-audio", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ videoUrl: clipUrl, audioUrl, mode: "replace" })
              });
              clipUrl = (await jsonOrThrow(mr)).url;
              dbg("ok", `${label} voiced (${[dLine && "dialogue", nLine && "narration"].filter(Boolean).join(" + ")})`);
            }
          } catch (e) {
            dbg("warn", `${label} audio failed (${e.message}); clip kept silent`);
          }
        }

        finals.push({ url: clipUrl, seconds: clipSec, size: scSize });
        setOuts([...finals]);
        setScProgress(p => p.map(x => x.index === clip.index ? { ...x, status: "done", clipUrl } : x));
        dbg("ok", `${label} rendered (seed=${seedKind})`);
        prevClip = clip;
      }

      // Stitch the clips into the final film. Narrated chains use hard cuts so the
      // per-clip audio doesn't overlap across a crossfade.
      setRefreshLib(x => x + 1);
      if (finals.length >= 2) {
        setStitching(true);
        const cf = narrating ? 0 : crossfade;
        setStatus({ phase: "running", pct: 95, label: `stitching ${finals.length} clips into the film…` });
        try {
          const r = await fetch("/api/stitch", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ urls: finals.map(f => f.url), crossfade: cf })
          });
          const j = await jsonOrThrow(r);
          setStitched({ url: j.url, clips: j.clips, crossfade: j.crossfade, bytes: j.bytes, narrated: narrating });
          dbg("ok", `stitched ${j.clips} clips → ${(j.bytes / 1024 / 1024).toFixed(1)}MB film`);
        } catch (e) {
          dbg("warn", "stitch failed; clips still available individually", e.message);
          toast("Stitch failed — clips are available individually", true);
        } finally { setStitching(false); }
      }

      setStatus({ phase: "done", pct: 100, label: "film ready" });
      toast("Story chain complete 🎬");
    } catch (e) {
      const cancelled = cancelRef.current || /Cancelled by user/i.test(e.message || "");
      setStatus({ phase: cancelled ? "idle" : "failed", pct: 0, label: cancelled ? "cancelled" : "error" });
      toast(cancelled ? "Story chain cancelled" : e.message.slice(0, 200), !cancelled);
    } finally {
      cancelRef.current = false; currentJobIdRef.current = null; setRunning(false);
    }
  }

  const recentLines = dbgLines.slice(-200);

  // Poll the server-side render queue: 5s while a film is rendering (live progress in the
  // Preview + queue), a slow 30s heartbeat when idle so the app isn't constantly re-rendering.
  const anyJobActive = jobs.some(j => j.status === "queued" || j.status === "running");
  const pollMs = anyJobActive ? 5000 : 30000;
  useEffect(() => {
    refreshJobs();
    const iv = setInterval(refreshJobs, pollMs);
    return () => clearInterval(iv);
  }, [pollMs]);
  // Poll GPU status (ARM read — does NOT wake the GPU): 8s during a start/stop transition,
  // 30s otherwise. Cheap management-plane call that keeps the header badge honest.
  const gpuTransitioning = gpuState === "starting" || gpuState === "stopping";
  const gpuPollMs = gpuTransitioning ? 8000 : 30000;
  useEffect(() => {
    refreshGpu();
    const iv = setInterval(refreshGpu, gpuPollMs);
    return () => clearInterval(iv);
  }, [gpuPollMs]);
  // Surface the background render in the main Preview: once the newest film finishes, load it
  // into the Preview ONCE (stable src — it won't reload on every poll's re-signed SAS URL).
  const shownJobRef = useRef(null);
  useEffect(() => {
    const done = (jobs || []).find(j => j.status === "succeeded" && j.resultUrl);
    if (done && shownJobRef.current !== done.id) {
      shownJobRef.current = done.id;
      setStitched(null);
      setOuts([{ url: done.resultUrl, name: done.title || "film", seconds: scClipSec, size: done.size || scSize }]);
    }
  }, [jobs]);
  // Advance to the story-review step automatically once a storyboard is generated.
  useEffect(() => { if (scStory && wizStep === 2) setWizStep(3); }, [scStory]);
  // When entering the Sound step, initialize scClipAudio slots for all clips
  // (existing entries with approved audio are kept; new slots start empty).
  useEffect(() => {
    if (wizStep === 5 && scStory && scNarrationMode !== "off") {
      const clips = scStory.clips || [];
      setScClipAudio(prev => clips.map((_, i) => prev.find(c => c.index === i) || {index: i, url: null, dur: 0, busy: false, error: null}));
    }
  }, [wizStep]);

  // GPU badge display: a render in flight means the GPU is busy; otherwise reflect the polled state.
  const gpuBusy = (jobs || []).some(j => j.status === "running");
  const gpuDot = { ready:"#22c55e", idle:"#eab308", starting:"#eab308", stopping:"#f97316", stopped:"#9ca3af", unknown:"#9ca3af" }[gpuState] || "#9ca3af";
  const gpuLabel = (gpuBusy && (gpuState === "ready" || gpuState === "idle")) ? "busy"
    : ({ ready:"ready", idle:"idle", starting:"starting…", stopping:"stopping…", stopped:"stopped", unknown:"—" }[gpuState] || gpuState);

  return html`
    <header class="app">
      <span class="dot"></span>
      <span class="title">avideo</span>
      <span class="badge">wan2.2 · ${scSize} · ${scClipCount} clips</span>
      <div style=${{display:"flex",gap:4,marginLeft:12}}>
        <button class="ghost small" onClick=${() => setPage("studio")}
          style=${page==="studio" ? {background:"var(--accent)",color:"#fff",borderColor:"var(--accent)"} : {}}>Studio</button>
        <button class="ghost small" onClick=${() => setPage("animate")}
          style=${page==="animate" ? {background:"var(--accent)",color:"#fff",borderColor:"var(--accent)"} : {}}>Animate</button>
        <button class="ghost small" onClick=${() => { setPage("history"); setRefreshLib(x => x + 1); }}
          style=${page==="history" ? {background:"var(--accent)",color:"#fff",borderColor:"var(--accent)"} : {}}>History</button>
      </div>
      <div class="spacer"></div>
      <div style=${{display:"flex",alignItems:"center",gap:6,marginRight:4}}>
        <button class="ghost small" onClick=${refreshGpu}
          title=${`Render GPU (A100) — ${gpuLabel}. Read live from Azure; click to refresh.`}
          style=${{display:"inline-flex",alignItems:"center",gap:6}}>
          <span style=${{width:8,height:8,borderRadius:"999px",background:gpuDot,display:"inline-block",flex:"0 0 auto"}}></span>
          GPU ${gpuLabel}
        </button>
        ${(gpuState === "stopped" || gpuState === "unknown")
          ? html`<button class="ghost small" onClick=${startGpu} disabled=${gpuState === "starting"} title="Start the render GPU">Start</button>`
          : html`<button class="ghost small" onClick=${stopGpu} disabled=${gpuState === "stopping" || gpuBusy}
              title=${gpuBusy ? "A render is using the GPU — cancel it first" : "Stop the GPU to cut A100 billing now"}>Stop</button>`}
      </div>
      <button class="ghost" onClick=${() => setTheme(theme === "light" ? "dark" : "light")} title="Toggle theme">
        ${theme === "light" ? "☾" : "☀"}
      </button>
      <button class="ghost" onClick=${() => setDrawerOpen(o => !o)} title="Debug log">
        debug${dbgLines.length > 0 ? html` <span class="pill">${dbgLines.length}</span>` : ""}
      </button>
      ${me && me.authenticated ? html`
        <span class="badge" title=${"object id: " + (me.objectId || "")}>${me.email || "signed in"}</span>
        <a class="ghost" href="/.auth/logout?post_logout_redirect_url=/" title="Sign out" style=${{textDecoration:"none",padding:"6px 10px"}}>sign out</a>
      ` : ""}
    </header>

    <main>
      ${page === "history" ? html`
      <!-- HISTORY: every saved film, with the prompt it was made from -->
      <div style=${{gridColumn:"1 / -1"}}>
        <${Library} refreshKey=${refreshLib} onSelect=${v => { setOuts([{ url: v.url, name: v.name, seconds: scClipSec, size: scSize }]); setStitched(null); setPage("studio"); toast("Loaded " + v.name); }} />
      </div>
      <!-- RENDER QUEUE on history page -->
      <div style=${{gridColumn:"1 / -1"}}>
        <div class="card">
          <h3 style=${{display:"flex",alignItems:"center",gap:8}}>🎞️ Render queue</h3>
          ${(() => {
            const activeJobs = jobs.filter(j => j.status === "queued" || j.status === "running");
            const doneJobs = jobs.filter(j => j.status !== "queued" && j.status !== "running");
            if (jobs.length === 0)
              return html`<p class="muted small">No films rendering. Build one in Studio and submit — it renders here in the background.</p>`;
            return html`
              ${activeJobs.length > 0
                ? html`<div class="stack" style=${{gap:8}}>
                    ${activeJobs.map(j => html`
                      <div key=${j.id} style=${{border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:10,background:"var(--surface-2)"}}>
                        <div style=${{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                          <strong style=${{flex:"1 1 120px",fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title=${j.title}>${j.title || "Untitled"}</strong>
                          <span class="pill small">${j.status}</span>
                          <button class="ghost small" onClick=${() => cancelJob(j.id)}>✕ Cancel</button>
                        </div>
                        ${j.label && html`<div class="muted small" style=${{margin:"4px 0"}}>${j.label}</div>`}
                        <div class="progress"><div style=${{width:(j.pct || 0) + "%"}}></div></div>
                      </div>`)}
                  </div>`
                : html`<p class="muted small">Nothing rendering right now.</p>`}
              ${doneJobs.length > 0 && html`
                <div style=${{marginTop:activeJobs.length > 0 ? 12 : 0}}>
                  <div class="muted small" style=${{margin:"8px 0 6px",textTransform:"uppercase",fontSize:11,letterSpacing:".4px"}}>Completed</div>
                  <div class="stack" style=${{gap:6}}>
                    ${doneJobs.map(j => {
                      const pillCls = j.status === "succeeded" ? "ok" : "err";
                      const label = j.status === "succeeded" ? "✓ completed" : j.status;
                      return html`
                        <div key=${j.id} style=${{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",padding:"7px 10px",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",background:"var(--surface-2)"}}>
                          <span class=${"pill small " + pillCls} style=${{flex:"0 0 auto"}}>${label}</span>
                          <span style=${{flex:"1 1 140px",fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title=${j.title}>${j.title || "Untitled"}</span>
                          ${j.idea && html`<span class="muted small" style=${{flex:"2 1 180px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title=${j.idea}>${j.idea}</span>`}
                          ${j.status === "succeeded" && j.resultUrl && html`<a class="ghost small" href=${j.resultUrl} target="_blank" rel="noopener" style=${{flex:"0 0 auto",textDecoration:"none"}}>open ↗</a>`}
                          ${j.status === "interrupted" && html`<span class="muted small" style=${{flex:"0 0 auto"}}>re-submit to render</span>`}
                          ${j.status === "failed" && html`<span class="muted small" style=${{flex:"0 0 auto",color:"#ef4444"}} title=${j.error || "render failed"}>render failed</span>`}
                        </div>`;
                    })}
                  </div>
                </div>
              `}
            `;
          })()}
        </div>
      </div>
      ` : page === "animate" ? html`
      <!-- ANIMATE: Wan2.2-Animate — drive a character image with a sample video -->
      <div style=${{gridColumn:"1 / -1"}}>
        <div class="card">
          <h3 style=${{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>🕺 Animate <span class="muted small" style=${{fontWeight:400}}>· Wan2.2-Animate — make a character copy a sample video's motion</span></h3>
          <p class="muted small" style=${{marginTop:0}}>Upload a <strong>character image</strong> and a short <strong>sample video</strong>. Wan-Animate drives the character so it replicates the video's body motion and facial expression. Renders on the A100 (a few minutes per clip).</p>

          <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:12,marginTop:8}}>
            <div style=${{border:"1px solid var(--border)",borderRadius:10,padding:12,background:"var(--surface-2)"}}>
              <label>① Character image</label>
              <input type="file" accept="image/*" onChange=${e => pickAnImage(e.target.files && e.target.files[0])} style=${{display:"block",marginTop:6,fontSize:12}} />
              ${anImagePreview ? html`<img src=${anImagePreview} style=${{marginTop:8,width:"100%",maxHeight:220,objectFit:"contain",borderRadius:8,background:"#0a0a0c"}} />` : html`<div class="muted small" style=${{marginTop:8}}>Who/what to animate (a person, character, etc.).</div>`}
            </div>
            <div style=${{border:"1px solid var(--border)",borderRadius:10,padding:12,background:"var(--surface-2)"}}>
              <label>② Sample / driving video</label>
              <input type="file" accept="video/*" onChange=${e => pickAnVideo(e.target.files && e.target.files[0])} style=${{display:"block",marginTop:6,fontSize:12}} />
              <div style=${{display:"flex",gap:6,alignItems:"center",marginTop:8,flexWrap:"wrap"}}>
                <input type="url" value=${anYoutubeUrl}
                  onInput=${e => { setAnYoutubeUrl(e.target.value); setAnVideo(null); setAnVideoPreview(null); }}
                  placeholder="— or paste a YouTube / social video URL —"
                  style=${{fontSize:12,flex:"1 1 200px",fontFamily:"inherit"}} />
                <button class="ghost small" onClick=${downloadReferenceVideo}
                  disabled=${anDownloadBusy || !anYoutubeUrl.trim()}>
                  ${anDownloadBusy ? "Downloading…" : "⬇ Download"}
                </button>
              </div>
              ${anVideoPreview ? html`<video src=${anVideoPreview} controls muted style=${{marginTop:8,width:"100%",maxHeight:220,objectFit:"contain",borderRadius:8,background:"#0a0a0c"}}></video>` : html`<div class="muted small" style=${{marginTop:8}}>Upload a short clip, or paste a YouTube URL and click ⬇ Download. The motion/performance from this video will be replicated on your character.</div>`}
            </div>
          </div>

          <div style=${{marginTop:10}}>
            <label>③ Scene direction <span class="muted small">· optional — describe the look / background</span></label>
            <textarea rows="2" value=${anPrompt} onInput=${e => setAnPrompt(e.target.value)} placeholder="e.g. 'cinematic, warm sunset light, city street background'" style=${{fontSize:13,fontFamily:"inherit",width:"100%"}}></textarea>
          </div>

          <div style=${{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginTop:10}}>
            <label class="muted small">Length</label>
            <select value=${anSeconds} onChange=${e => setAnSeconds(Number(e.target.value))} disabled=${anBusy}>
              ${[5,10,15,20,30,45,60].map(s => html`<option value=${s} key=${s}>${s}s</option>`)}
            </select>
            <span class="muted small">· ${scSize}</span>
            <div class="spacer"></div>
            ${anBusy ? html`<button class="ghost" onClick=${cancelAnimate}>✕ Cancel</button>` : ""}
            <button class="primary" onClick=${submitAnimate} disabled=${anBusy || !anImage || !anVideo}>
              ${anBusy ? "Working…" : "🎬 Animate"}
            </button>
          </div>

          ${anStatus && html`<div class="muted small" style=${{marginTop:10,display:"flex",alignItems:"center",gap:8}}><span class="pill">running</span> ${anStatus}</div>`}
          ${anError && html`<div class="small" style=${{marginTop:10,color:"#ef4444"}}>${anError}</div>`}

          ${anResult && anResult.url && html`
            <div style=${{marginTop:14}}>
              <div class="preview" style=${{maxWidth:520}}><video src=${anResult.url} controls autoplay loop></video></div>
              <div class="meta" style=${{marginTop:6}}><a href=${anResult.url} target="_blank" rel="noopener">download ↗</a></div>
            </div>`}

          <p class="muted small" style=${{marginTop:14,borderTop:"1px solid var(--border)",paddingTop:10}}>
            Needs the Wan-Animate weights staged on the GPU and <code>WAN_ANIMATE_ENABLED=1</code>. Until then, pressing Animate shows a clear “not activated” message.
          </p>
        </div>
      </div>
      ` : html`
      <!-- LEFT: Compose -->
      <div key="studio-left">
        <!-- AI Story/Dialog Chat -->
        <div class="card" style=${{background:"linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%)", borderColor:"#6366f1", borderWidth:1, borderStyle:"solid"}}>
          <h3 style=${{display:"flex",alignItems:"center",gap:8}}>✨ Deep Reasoning Story</h3>

          <!-- Input area -->
          <div style=${{display:"flex",gap:6,flexDirection:"column"}}>
            <!-- Deep Reasoning Workflow -->
            ${(!reasoningWorkflow || reasoningWorkflow === "init") && html`
              <div style=${{marginBottom:8}}>
                <p class="muted small" style=${{margin:"0 0 8px"}}>💡 Enter a story idea and the AI will analyze it, suggest refinements, and generate a synchronized story + dialogue pair.</p>
              </div>
              <textarea rows="2" placeholder="e.g., 'A detective solves a cold case' or 'An astronaut discovers life on Mars'" 
                value=${reasoningInitialPrompt}
                onInput=${e => setReasoningInitialPrompt(e.target.value)}
                onKeyDown=${e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); startReasoningAnalysis(); } }}
                style=${{fontSize:12,fontFamily:"inherit"}}></textarea>
              <button class="primary small" onClick=${startReasoningAnalysis} disabled=${!reasoningInitialPrompt.trim()}>
                💭 Analyze & Generate Questions
              </button>
            `}

            ${(reasoningWorkflow === "analyzing" || reasoningWorkflow === "generating") && html`
              <div style=${{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"24px 8px",textAlign:"center"}}>
                <div style=${{fontSize:22}}>${reasoningWorkflow === "analyzing" ? "💭" : "✨"}</div>
                <div style=${{fontSize:13,fontWeight:600}}>${reasoningWorkflow === "analyzing" ? "Analyzing your idea…" : "Writing your story & dialogue…"}</div>
                <div class="muted small">The AI is thinking it through — this can take up to a minute. Please keep this tab open.</div>
              </div>
            `}

            ${reasoningWorkflow === "questions" && reasoningAnalysis && html`
              <div style=${{display:"flex",flexDirection:"column",gap:10}}>
                ${reasoningAnalysis.questions && reasoningAnalysis.questions.map((q, i) => html`
                  <div key=${i}>
                    <label style=${{display:"block",marginBottom:6,fontWeight:500,fontSize:13}}>${q.question}</label>
                    <select value=${userRefinements[q.id] || q.suggested || ""}
                      onChange=${e => setUserRefinements(prev => ({...prev, [q.id]: e.target.value}))}
                      style=${{fontSize:12,width:"100%"}}>
                      ${q.options && q.options.map(opt => html`<option key=${opt} value=${opt}>${opt}</option>`)}
                    </select>

                    ${hasLines ? html`
                      <div class="muted small" style=${{margin:"4px 0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title=${nLine||""}>&#128250; ${nLine||"(no narration)"}</div>
                      ${dLine ? html`<div class="muted small" style=${{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title=${dLine}><em>&#128172; ${dLine}</em></div>` : ""}
                    ` : ""}
                    ${hasLines ? html`
                      <div style=${{display:"flex",gap:6,flexWrap:"wrap",marginTop:6,alignItems:"center"}}>
                        ${ca.url ? html`<button class="ghost small" onClick=${()=>{try{if(alAudioRef.current)alAudioRef.current.pause();const a=new Audio(ca.url);alAudioRef.current=a;a.play();}catch{}}}>&#9654; Play</button>` : ""}
                        <button class="ghost small" onClick=${()=>synthClipAudio(i)} disabled=${ca.busy||soundBusy}>↺ Redo</button>
                        <select style=${{fontSize:11}} onChange=${e=>{const v=e.target.value; synthClipAudio(i,v,null);}} title="Change narrator voice for this clip">
                          <option value="">Narrator: ${voices.find(v=>v.shortName===voice)?.localName||voice}</option>
                          ${langVoices.filter(v=>v.gender==="female"||v.gender==="Female").slice(0,4).map(v=>html`<option key=${v.shortName} value=${v.shortName}>${v.localName||v.shortName}</option>`)}
                        </select>
                        ${ca.error ? html`<span class="small" style=${{color:"#ef4444",flex:"1 1 200px"}}>${ca.error}</span>` : ""}
                      </div>
                    ` : ""}
                  </div>`;
                })}
              </div>
              `}
            </div>
            `}

            <!-- STEP 6: render -->            ${wizStep === 6 && html`
            <div>
              <label>⑥ Render</label>
              <div class="plan" style=${{marginTop:6}}>
                <div class="plan-head"><strong>${(scStory && scStory.title) || "Your film"}</strong><span class="pill">${scClipCount} clips · ${scClipSec}s</span></div>
                <div class="muted small" style=${{padding:"0 12px 10px",display:"flex",flexDirection:"column",gap:4}}>
                  <span>🎬 ${scClipCount} clips · ${scSize} · ${scAspect}</span>
                  <span>🗣️ ${scNarrationMode === "off" ? "Silent" : ("Voiceover in " + voiceLanguage(voice))}</span>
                  <span>🎭 ${(scCast || []).length} character(s)${scCharFile ? " · lead photo provided" : ""}</span>
                  <span>🖼️ Portraits via ${scImageEngine === "flux" ? "FLUX.1 Schnell" : "ComfyUI still"}</span>
                </div>
              </div>
              <p class="muted small" style=${{marginTop:6}}>
                Submitting sends this film to the background render queue. The wizard resets so you can start another — track progress and cancel any job in the queue below. Finished films are saved and appear automatically.
              </p>
            </div>
            <div class="btn-row" style=${{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <button class="primary" onClick=${submitStoryJob} disabled=${scCasting || !scStory}>
                ${scCasting ? "Submitting…" : "🚀 Submit to render queue"}
              </button>
            </div>
            `}

            <!-- wizard navigation -->
            <div style=${{display:"flex",gap:8,alignItems:"center",justifyContent:"space-between",marginTop:8,borderTop:"1px solid var(--border)",paddingTop:10}}>
              <button class="ghost" onClick=${wizBack} disabled=${wizStep === 1}>← Back</button>
              <span class="muted small">Step ${wizStep} of 6</span>
              ${wizStep < 6
                ? html`<button class="primary" onClick=${wizNext} disabled=${wizCanNext[wizStep] && !wizCanNext[wizStep]()}>Next →</button>`
                : html`<span style=${{width:64}}></span>`}
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Preview (the current film) -->
      <div key="studio-right">
        <div class="card">
          <h3>Preview</h3>
          <div class="preview">
            ${(() => {
              // While the newest film is still rendering, show its live progress right here in
              // the main screen; once it (or any film) has finished, show the video.
              const newest = (jobs && jobs.length) ? jobs[0] : null;
              if (newest && (newest.status === "running" || newest.status === "queued")) {
                return html`<div class="empty" style=${{textAlign:"center",padding:"0 16px",width:"100%"}}>
                  <div style=${{fontSize:30,marginBottom:8}}>🎬</div>
                  <div style=${{fontWeight:600,marginBottom:4,fontSize:14}}>Rendering “${newest.title || "your film"}”…</div>
                  <div class="muted small">${newest.label || newest.status}${newest.pct ? " · " + Math.round(newest.pct) + "%" : ""}</div>
                  <div class="progress" style=${{marginTop:10,maxWidth:260,marginLeft:"auto",marginRight:"auto"}}><div style=${{width:(newest.pct||0)+"%"}}></div></div>
                </div>`;
              }
              const headline = stitched?.url || (outs.length > 0 ? outs[outs.length-1].url : null);
              if (!headline) return html`<div class="empty">Your video will appear here.</div>`;
              return html`<video src=${headline} controls autoplay loop></video>`;
            })()}
          </div>
          ${stitched && html`
            <div class="meta" style=${{flexWrap:"wrap"}}>
              <span class="pill ok">combined · ${stitched.clips} clips · ${stitched.crossfade > 0 ? stitched.crossfade + "s crossfade" : "hard cuts"} · ${(stitched.bytes/1024/1024).toFixed(1)}MB</span>
              <a href=${stitched.url} target="_blank" rel="noopener">download ↗</a>
            </div>
          `}
          ${outs.length >= 2 && html`
            <div class="meta" style=${{flexWrap:"wrap",gap:6}}>
              <span style=${{opacity:.7,marginRight:6}}>Transition:</span>
              <button class="ghost" disabled=${stitching} onClick=${() => restitch(0)} title="Lossless concat, ~1s. Best when last-frame anchor worked.">hard cut</button>
              <button class="ghost" disabled=${stitching} onClick=${() => restitch(0.3)} title="Re-encodes the whole video. ~30s on F1.">0.3s xfade</button>
              <button class="ghost" disabled=${stitching} onClick=${() => restitch(0.5)} title="Re-encodes the whole video. ~30s on F1.">0.5s xfade</button>
              ${stitching && html`<span class="pill">stitching…</span>`}
            </div>
          `}
          ${outs.length > 0 && html`
            <div class="meta">
              ${outs.map((o, i) => html`<a href=${o.url} target="_blank" rel="noopener" key=${i}>clip ${i+1}/${outs.length} ↗</a>`)}
              <span>${scClipSec}s × ${outs.length} · ${scSize}</span>
            </div>
          `}
        </div>
      </div>
      `}
    </main>

    <div class=${"drawer" + (drawerOpen ? " open" : "")}>
      <div class="head" onClick=${() => setDrawerOpen(o => !o)}>
        <strong style=${{fontSize:12,letterSpacing:".04em",textTransform:"uppercase"}}>Debug log</strong>
        <span class="pill">${dbgLines.length}</span>
        <span style=${{flex:1}}></span>
        <button class="ghost small" onClick=${e => { e.stopPropagation(); navigator.clipboard.writeText(recentLines.map(l => `[${l.t}] ${l.level} ${l.label}${l.detail ? "\n  " + l.detail : ""}`).join("\n")); toast("Copied"); }}>copy</button>
        <button class="ghost small" onClick=${e => { e.stopPropagation(); dbgLines.length = 0; force(x => x+1); }}>clear</button>
        <span style=${{fontSize:11,color:"var(--muted)"}}>${drawerOpen ? "▼" : "▲"}</span>
      </div>
      <div class="body">
        ${recentLines.length === 0
          ? html`<div class="muted">No events yet.</div>`
          : recentLines.slice().reverse().map((l, i) => html`
              <div class=${"line " + l.level} key=${i}>
                <span class="lvl">${l.level}</span> [${l.t}] ${l.label}${l.detail ? "\n  " + l.detail : ""}
              </div>
            `)}
      </div>
    </div>
  `;
}

createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
