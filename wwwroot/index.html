<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VideoTool · AI Studio</title>
<style>
  :root {
    --bg-0: #0a0b14;
    --bg-1: #111327;
    --bg-2: #181b35;
    --line: #262a4a;
    --text: #e7e9ff;
    --muted: #8a90b8;
    --accent: #7c5cff;
    --accent-2: #22d3ee;
    --ok: #22c55e;
    --err: #ef4444;
    --warn: #f59e0b;
  }
  * { box-sizing: border-box }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(124,92,255,.25), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(34,211,238,.18), transparent 60%),
      var(--bg-0);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 22px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 10;
    background: rgba(10,11,20,.7);
  }
  .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; letter-spacing: .2px; }
  .logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: conic-gradient(from 200deg, var(--accent), var(--accent-2), var(--accent));
    box-shadow: 0 0 24px rgba(124,92,255,.45);
  }
  .pill { font-size: 12px; color: var(--muted); padding: 4px 10px; border: 1px solid var(--line); border-radius: 999px; }
  main {
    max-width: 1200px; margin: 28px auto; padding: 0 24px;
    display: grid; grid-template-columns: 1.1fr 1fr; gap: 24px;
  }
  @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
  .card {
    background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
  }
  h2 { margin: 0 0 14px; font-size: 16px; letter-spacing: .3px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: .8px; }
  textarea, input, select {
    width: 100%;
    background: #0d1024; color: var(--text);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; font: inherit;
    transition: border .15s, box-shadow .15s;
  }
  textarea { resize: vertical; min-height: 110px; }
  textarea:focus, input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,255,.25); }
  button.primary {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; margin-top: 16px;
    padding: 14px 16px; font: 600 15px/1 inherit; color: #0b0c1a;
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    border: 0; border-radius: 12px; cursor: pointer;
    transition: transform .1s, filter .15s, opacity .15s;
    box-shadow: 0 10px 30px rgba(124,92,255,.35);
  }
  button.primary:hover { filter: brightness(1.06); }
  button.primary:active { transform: translateY(1px); }
  button.primary[disabled] { opacity: .55; cursor: not-allowed; box-shadow: none; }
  button.ghost {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 14px; font: 600 13px/1 inherit; color: var(--text);
    background: transparent; border: 1px solid var(--line); border-radius: 10px; cursor: pointer;
  }
  button.ghost:hover { border-color: var(--accent); }
  .progress { margin-top: 18px; }
  .bar { height: 8px; background: #0d1024; border-radius: 999px; border: 1px solid var(--line); overflow: hidden; }
  .bar > i {
    display: block; height: 100%; width: 0;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    transition: width .4s ease;
  }
  .status {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px; font-size: 12px; color: var(--muted);
  }
  .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-right: 6px; }
  .status.queued .dot { background: var(--warn); }
  .status.in_progress .dot { background: var(--accent-2); animation: pulse 1.2s infinite; }
  .status.completed .dot { background: var(--ok); }
  .status.failed .dot, .status.cancelled .dot { background: var(--err); }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
  .toast {
    position: fixed; right: 20px; bottom: 20px; max-width: 360px;
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; font-size: 13px; color: var(--text);
    box-shadow: 0 16px 50px rgba(0,0,0,.5);
    transform: translateY(20px); opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.err { border-color: rgba(239,68,68,.6); }
  .lib-item {
    aspect-ratio: 16/9; background: #0d1024; border: 1px solid var(--line);
    border-radius: 10px; overflow: hidden; cursor: pointer; position: relative;
    transition: border-color .15s, transform .15s;
  }
  .lib-item:hover { border-color: var(--accent); transform: translateY(-2px); }
  .lib-item video, .lib-item .thumb { width: 100%; height: 100%; object-fit: cover; }
  .lib-item .thumb { display: flex; align-items: center; justify-content: center; background: #0a0b14; font-size: 24px; }
  .lib-item-del {
    position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,.7);
    color: var(--err); border: none; border-radius: 6px; padding: 4px 8px;
    cursor: pointer; font-size: 11px; opacity: 0; transition: opacity .15s;
  }
  .lib-item:hover .lib-item-del { opacity: 1; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo"></div>
    <div>VideoTool <span class="pill">AI Studio</span></div>
  </div>
  <div class="pill" id="health">checking…</div>
</header>

<main>
  <!-- LEFT: composer -->
  <section class="card">
    <h2>Create Video</h2>

    <label for="prompt">Story Prompt</label>
    <textarea id="prompt" placeholder="Describe your story idea. E.g.: A serene timelapse of clouds drifting over snow-capped mountains at golden hour, cinematic, 8K quality"></textarea>

    <button id="go" class="primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Generate Video
    </button>

    <div class="progress" id="progress" hidden>
      <div class="bar"><i id="barFill"></i></div>
      <div class="status" id="statusLine"><span><span class="dot"></span><span id="statusText">generating…</span></span><span id="elapsed">0s</span></div>
    </div>
  </section>

  <!-- RIGHT: library -->
  <section class="card">
    <h2>Video Gallery</h2>
    <div style="display:flex;gap:6px;margin:8px 0">
      <button type="button" id="libRefresh" class="ghost">🔄 Refresh</button>
      <span id="libStatus" style="font-size:12px;opacity:.7;align-self:center"></span>
    </div>
    <div id="libGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;min-height:200px"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// UI helpers
const show = el => el && (el.hidden = false);
const hide = el => el && (el.hidden = true);
const toast = (msg, isErr) => {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.toggle('err', isErr);
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
};

// Health check
fetch('/health').then(r => r.json()).then(d => {
  $('#health').textContent = d.status === 'ok' ? '✅ Ready' : '⚠️ ' + d.status;
  $('#health').style.borderColor = d.status === 'ok' ? '#22c55e' : '#f59e0b';
}).catch(e => {
  $('#health').textContent = '❌ Error';
  $('#health').style.borderColor = '#ef4444';
});

// Generate video
let isGenerating = false;
$('#go').addEventListener('click', async () => {
  const prompt = $('#prompt').value.trim();
  if (!prompt) {
    toast('Please enter a story prompt', true);
    return;
  }
  
  isGenerating = true;
  $('#go').disabled = true;
  show($('#progress'));
  $('#statusText').textContent = 'generating…';
  $('#barFill').style.width = '30%';
  
  try {
    const res = await fetch('/api/videos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    
    $('#prompt').value = '';
    toast('✅ Video generation started!');
    
    setTimeout(() => {
      hide($('#progress'));
      isGenerating = false;
      $('#go').disabled = false;
      loadVideos();
    }, 2000);
  } catch (e) {
    toast('❌ ' + (e.message || 'Failed to create video'), true);
    isGenerating = false;
    $('#go').disabled = false;
    hide($('#progress'));
  }
});

// Load videos
async function loadVideos() {
  const grid = $('#libGrid');
  const status = $('#libStatus');
  
  try {
    const res = await fetch('/api/videos');
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    
    const data = await res.json();
    const videos = data.videos || [];
    
    if (videos.length === 0) {
      grid.innerHTML = '<div style="color:var(--muted);font-size:13px;grid-column:1/-1;text-align:center;padding:40px 20px">No videos yet. Create one above!</div>';
      status.textContent = '';
      return;
    }
    
    grid.innerHTML = videos.map((v, i) => `
      <div class="lib-item" onclick="selectVideo(this, '${v.name}')">
        <div class="thumb">🎬</div>
        <button class="lib-item-del" onclick="deleteVideo(event, '${v.name}')">Delete</button>
      </div>
    `).join('');
    
    status.textContent = `${videos.length} video${videos.length !== 1 ? 's' : ''}`;
  } catch (e) {
    grid.innerHTML = `<div style="color:var(--err);font-size:13px;grid-column:1/-1">${e.message}</div>`;
  }
}

function selectVideo(el, name) {
  $$('.lib-item').forEach(v => v.style.borderColor = 'var(--line)');
  el.style.borderColor = 'var(--accent)';
}

async function deleteVideo(e, name) {
  e.stopPropagation();
  if (!confirm('Delete this video?')) return;
  
  try {
    const path = name.split('/').map(encodeURIComponent).join('/');
    const res = await fetch(`/api/videos/${path}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    toast('✅ Video deleted');
    loadVideos();
  } catch (e) {
    toast('❌ ' + e.message, true);
  }
}

// Refresh button
$('#libRefresh').addEventListener('click', loadVideos);

// Load on page load
window.addEventListener('load', loadVideos);
</script>
</body>
</html>
