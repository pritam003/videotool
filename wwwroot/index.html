<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sora Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://esm.sh" />
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface-2: #f1f1ee;
    --border: #e3e3df;
    --text: #1c1d22;
    --muted: #6b6f76;
    --accent: #2f6df4;
    --accent-soft: #e6efff;
    --danger: #c5301f;
    --warn: #b8770b;
    --ok: #1a8451;
    --shadow: 0 1px 2px rgba(20,20,25,.04), 0 8px 24px rgba(20,20,25,.06);
    --radius: 14px;
    --radius-sm: 10px;
    --mono: ui-monospace, SF Mono, Menlo, Consolas, monospace;
  }
  html[data-theme="dark"] {
    --bg: #0f1115;
    --surface: #16181d;
    --surface-2: #1d2026;
    --border: #2a2d35;
    --text: #e8eaf0;
    --muted: #9aa0ac;
    --accent: #6ea0ff;
    --accent-soft: #1d2a44;
    --danger: #ff7466;
    --warn: #f0b454;
    --ok: #58c79b;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }
  button, input, select, textarea {
    font: inherit; color: inherit;
  }
  button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  button:hover:not(:disabled) { background: var(--surface-2); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  button.primary:hover:not(:disabled) { filter: brightness(1.05); }
  button.ghost { background: transparent; border-color: transparent; }
  button.ghost:hover:not(:disabled) { background: var(--surface-2); }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 9px 11px; border-radius: var(--radius-sm); outline: none;
    transition: border-color .12s, box-shadow .12s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea { resize: vertical; min-height: 64px; font-family: inherit; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }

  header.app {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: saturate(140%) blur(10px);
    background: color-mix(in srgb, var(--bg) 80%, transparent);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 12px;
  }
  header.app .title { font-weight: 600; font-size: 15px; letter-spacing: -.01em; }
  header.app .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  header.app .spacer { flex: 1; }
  header.app .badge { font-size: 11px; color: var(--muted); padding: 3px 8px;
    background: var(--surface-2); border-radius: 999px; }

  main { max-width: 1280px; margin: 0 auto; padding: 24px;
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr); gap: 24px;
    align-items: start; }
  @media (max-width: 980px) { main { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 18px;
  }
  .card + .card { margin-top: 16px; }
  .card h3 { margin: 0 0 12px; font-size: 13px; font-weight: 600; letter-spacing: .02em;
    text-transform: uppercase; color: var(--muted); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row.three { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 600px) { .row, .row.three { grid-template-columns: 1fr; } }

  .accordion-item { border-top: 1px solid var(--border); }
  .accordion-item:first-child { border-top: 0; }
  .accordion-head { display: flex; align-items: center; gap: 8px; padding: 12px 0; cursor: pointer;
    user-select: none; font-weight: 500; }
  .accordion-head .chev { color: var(--muted); transition: transform .15s; }
  .accordion-item.open .chev { transform: rotate(90deg); }
  .accordion-body { padding: 4px 0 16px; }

  .stack { display: flex; flex-direction: column; gap: 12px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px;
    background: var(--surface-2); border-radius: 999px; font-size: 11px; color: var(--muted); }
  .pill.ok { color: var(--ok); }
  .pill.err { color: var(--danger); }
  .pill.warn { color: var(--warn); }

  .preview { aspect-ratio: 16/9; background: #0a0a0c; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    border: 1px solid var(--border); }
  .preview .empty { color: #777; font-size: 13px; }
  .preview video { width: 100%; height: 100%; object-fit: contain; }

  .progress { height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden;
    margin-top: 10px; }
  .progress > div { height: 100%; background: var(--accent); width: 0; transition: width .3s; }

  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; font-size: 12px; color: var(--muted); }
  .meta a, .meta span { background: var(--surface-2); padding: 4px 9px; border-radius: 8px;
    text-decoration: none; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
  .clip { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    overflow: hidden; cursor: pointer; transition: transform .12s, border-color .12s;
    padding: 0; text-align: left; font: inherit; color: inherit; }
  .clip:hover { border-color: var(--accent); transform: translateY(-1px); }
  .clip video { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #000; }
  .clip .name { font-size: 11px; padding: 6px 8px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--mono); }

  /* Final prompt big editable */
  textarea.final { font-family: var(--mono); font-size: 12.5px; min-height: 240px; }

  /* Story plan */
  .plan { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; background: var(--surface-2); }
  .plan-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .plan-seg { border-top: 1px dashed var(--border); padding: 8px 4px; }
  .plan-seg:first-of-type { border-top: 0; }
  .plan-seg.done { opacity: 0.65; }
  .plan-seg-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .plan-seg-summary { font-weight: 500; }
  .plan-beats { margin: 6px 0 0 24px; padding: 0; font-size: 12.5px; color: var(--muted); }
  .plan-beats li { margin: 2px 0; }
  .plan-dialogue { font-size: 12.5px; margin: 4px 0 0 24px; color: var(--text); }

  /* Toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: 999px;
    font-size: 13px; box-shadow: var(--shadow); z-index: 100; opacity: 0; transition: opacity .2s;
    pointer-events: none; max-width: 90vw; }
  .toast.show { opacity: 1; }
  .toast.err { background: var(--danger); color: white; }

  /* Debug drawer */
  .drawer { position: fixed; bottom: 0; right: 0; width: min(560px, 100vw);
    max-height: 50vh; background: var(--surface); border-top-left-radius: var(--radius);
    border: 1px solid var(--border); border-right: 0; border-bottom: 0;
    box-shadow: var(--shadow); display: flex; flex-direction: column; z-index: 60;
    transform: translateY(calc(100% - 36px)); transition: transform .2s;
  }
  .drawer.open { transform: translateY(0); }
  .drawer .head { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .drawer .body { flex: 1; overflow: auto; padding: 8px 12px; font: 11px/1.45 var(--mono); }
  .drawer .body .line { padding: 3px 0; border-bottom: 1px dashed var(--border); white-space: pre-wrap; word-break: break-word; }
  .drawer .body .line .lvl { display: inline-block; width: 44px; font-weight: 600; }
  .drawer .body .line.error .lvl { color: var(--danger); }
  .drawer .body .line.warn .lvl  { color: var(--warn); }
  .drawer .body .line.net .lvl   { color: var(--accent); }
  .drawer .body .line.ok .lvl    { color: var(--ok); }
  .drawer .body .line.info .lvl  { color: var(--muted); }

  details summary { cursor: pointer; }
  hr.sep { border: 0; border-top: 1px solid var(--border); margin: 14px 0; }
  .muted { color: var(--muted); }
  .small { font-size: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>

<script type="importmap">
{ "imports": {
  "react": "https://esm.sh/react@18.3.1",
  "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
  "htm": "https://esm.sh/htm@3.1.1/react?external=react"
}}
</script>

<script type="module">
import React, { useState, useEffect, useRef, useCallback, useMemo } from "react";
import { createRoot } from "react-dom/client";
import { html } from "htm";

// ---------- debug log ----------
const dbgListeners = new Set();
const dbgLines = [];
function dbg(level, label, detail) {
  const t = new Date().toLocaleTimeString();
  const line = { t, level, label, detail };
  dbgLines.push(line);
  if (dbgLines.length > 500) dbgLines.shift();
  dbgListeners.forEach(fn => fn());
}
const _fetch = window.fetch.bind(window);
window.fetch = async (input, init) => {
  const url = typeof input === "string" ? input : input.url;
  const method = (init?.method || (typeof input === "object" && input.method) || "GET").toUpperCase();
  const t0 = performance.now();
  try {
    const r = await _fetch(input, init);
    const ms = (performance.now() - t0).toFixed(0);
    if (!r.ok) {
      let body = ""; try { body = (await r.clone().text()).slice(0, 1500); } catch {}
      dbg("error", `${method} ${url} → ${r.status} (${ms}ms)`, body);
    } else {
      dbg("net", `${method} ${url} → ${r.status} (${ms}ms)`);
    }
    return r;
  } catch (e) {
    const ms = (performance.now() - t0).toFixed(0);
    dbg("error", `${method} ${url} → network failure (${ms}ms)`, String(e));
    throw e;
  }
};
window.addEventListener("error", e => dbg("error", e.message,
  `${e.filename}:${e.lineno}:${e.colno}\n${e.error?.stack || ""}`));
window.addEventListener("unhandledrejection", e => {
  const msg = String(e.reason?.message || e.reason || "");
  // Benign: HTMLMediaElement aborts a pending play() when we pause/seek to grab last frame.
  if (/play\(\) request was interrupted/i.test(msg)) { e.preventDefault(); return; }
  dbg("error", "unhandledrejection", String(e.reason?.stack || msg));
});

// ---------- toast ----------
function toast(msg, isErr) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = "toast show" + (isErr ? " err" : "");
  setTimeout(() => el.classList.remove("show"), 2600);
  dbg(isErr ? "error" : "info", msg);
}

// ---------- helpers ----------
const SIZES = ["1280x720", "720x1280"];
const DURATIONS = [
  { v: 4, label: "4s" }, { v: 8, label: "8s" }, { v: 12, label: "12s" },
  { v: 24, label: "24s (×2)" }, { v: 36, label: "36s (×3)" }, { v: 48, label: "48s (×4)" },
];
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function jsonOrThrow(r) {
  const txt = await r.text();
  if (!r.ok) throw new Error(txt.slice(0, 400) || `HTTP ${r.status}`);
  try { return JSON.parse(txt); } catch { return txt; }
}

// ---------- App ----------
function useTheme() {
  const [theme, setTheme] = useState(() => localStorage.getItem("theme") || "light");
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("theme", theme);
  }, [theme]);
  return [theme, setTheme];
}

function Accordion({ title, children, defaultOpen }) {
  const [open, setOpen] = useState(!!defaultOpen);
  return html`
    <div class=${"accordion-item" + (open ? " open" : "")}>
      <div class="accordion-head" onClick=${() => setOpen(o => !o)}>
        <span class="chev">▸</span>
        <span>${title}</span>
      </div>
      ${open && html`<div class="accordion-body">${children}</div>`}
    </div>
  `;
}

function Library({ refreshKey, onSelect }) {
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const load = useCallback(async () => {
    setLoading(true); setErr("");
    try {
      const r = await fetch("/api/videos?limit=60");
      const j = await jsonOrThrow(r);
      setVideos(j.videos || []);
    } catch (e) { setErr(e.message); }
    finally { setLoading(false); }
  }, []);
  useEffect(() => { load(); }, [load, refreshKey]);
  return html`
    <div class="card">
      <h3 style=${{display:"flex",alignItems:"center",gap:8}}>
        Earlier videos
        <span class="pill">${videos.length}</span>
        <span style=${{flex:1}}></span>
        <button class="ghost small" onClick=${load} disabled=${loading}>${loading ? "…" : "↻ Refresh"}</button>
      </h3>
      ${err && html`<div class="pill err small">${err}</div>`}
      ${!loading && videos.length === 0 && html`<div class="muted small">No videos yet. Generate one above.</div>`}
      <div class="grid">
        ${videos.map(v => html`
          <button
            type="button"
            class="clip"
            key=${v.name}
            title=${v.name + " — click to load in preview"}
            onClick=${() => onSelect && onSelect(v)}>
            <video src=${v.url} muted preload="metadata"
              onMouseEnter=${e => { try { e.currentTarget.currentTime = 0.1; e.currentTarget.play(); } catch{} }}
              onMouseLeave=${e => { e.currentTarget.pause(); }}></video>
            <div class="name">${new Date(v.createdOn || v.lastModified).toLocaleString()}</div>
          </button>
        `)}
      </div>
    </div>
  `;
}

function App() {
  const [theme, setTheme] = useTheme();
  const [voices, setVoices] = useState([]);
  const [voice, setVoice] = useState("en-US-AvaMultilingualNeural");
  const [prompt, setPrompt] = useState("");
  const [narration, setNarration] = useState("");
  const [seconds, setSeconds] = useState(8);
  const [size, setSize] = useState("1280x720");
  const [refFile, setRefFile] = useState(null);
  const [finalPrompt, setFinalPrompt] = useState("");
  const [plan, setPlan] = useState(null);
  const [segSummaries, setSegSummaries] = useState([]);
  const [identityBible, setIdentityBible] = useState(null); // { characterDescriptor, wardrobe, sceneDescriptor, palette, lensLightingNotes }
  const [enhancing, setEnhancing] = useState(false);
  const [running, setRunning] = useState(false);
  const [status, setStatus] = useState({ phase: "idle", pct: 0, label: "ready" });
  const [outs, setOuts] = useState([]);
  const [stitched, setStitched] = useState(null); // { url, clips, crossfade } or null
  const [stitching, setStitching] = useState(false);
  const [crossfade, setCrossfade] = useState(0); // seconds; 0 = lossless hard cut
  const [refreshLib, setRefreshLib] = useState(0);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [, force] = useState(0);

  useEffect(() => {
    const fn = () => force(x => x + 1);
    dbgListeners.add(fn);
    return () => dbgListeners.delete(fn);
  }, []);

  // load voices
  useEffect(() => {
    (async () => {
      try {
        const r = await fetch("/api/voices");
        const raw = await jsonOrThrow(r);
        // /api/voices returns a flat array with PascalCase keys from the Speech REST API.
        const arr = Array.isArray(raw) ? raw : (raw.voices || []);
        const mapped = arr.map(v => ({
          shortName: v.shortName || v.ShortName,
          localName: v.localName || v.LocalName || v.DisplayName,
          gender: (v.gender || v.Gender || "").toLowerCase(),
          locale: v.locale || v.Locale || "",
          localeName: v.localeName || v.LocaleName || "",
        })).filter(v => v.shortName);
        setVoices(mapped);
        dbg("info", `voices loaded: ${mapped.length}`);
      } catch (e) { dbg("warn", "voices load failed", e.message); }
    })();
  }, []);

  const voiceGroups = useMemo(() => {
    const groups = { "English (US)": [], "English (India)": [], "Hindi (India)": [], "Bengali (India)": [], "Other": [] };
    voices.forEach(v => {
      const loc = v.locale || "";
      if (loc === "en-US") groups["English (US)"].push(v);
      else if (loc === "en-IN") groups["English (India)"].push(v);
      else if (loc === "hi-IN") groups["Hindi (India)"].push(v);
      else if (loc === "bn-IN") groups["Bengali (India)"].push(v);
      else groups["Other"].push(v);
    });
    return groups;
  }, [voices]);

  async function enhance() {
    if (!prompt.trim()) { toast("Enter a prompt first.", true); return; }
    setEnhancing(true);
    try {
      const r = await fetch("/api/enhance", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, narration, voice, seconds, size }),
      });
      const j = await jsonOrThrow(r);
      setFinalPrompt(j.enhanced || "");
      setPlan(j.plan || null);
      setSegSummaries([]);
      const segCount = j.plan?.segments?.length || 0;
      toast(segCount > 1
        ? `Plan ready — ${segCount} segments. Edit if needed, then run.`
        : "Final prompt generated. You can edit it before running.");
    } catch (e) { toast("Enhance failed: " + e.message, true); }
    finally { setEnhancing(false); }
  }

  // Auto re-enhance when duration / aspect / voice change AFTER the user has
  // already generated a prompt at least once. Debounced; skips if user is editing.
  const enhanceSig = `${seconds}|${size}|${voice}`;
  const lastEnhanceSig = useRef("");
  const everEnhanced = useRef(false);
  useEffect(() => {
    if (!finalPrompt.trim()) return;          // never enhanced or cleared
    if (!everEnhanced.current) return;        // only after user clicked once
    if (lastEnhanceSig.current === enhanceSig) return;
    const handle = setTimeout(() => {
      lastEnhanceSig.current = enhanceSig;
      enhance();
    }, 700);
    return () => clearTimeout(handle);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [enhanceSig]);
  // wrap the click handler so we mark first-enhance done
  async function enhanceClick() {
    everEnhanced.current = true;
    lastEnhanceSig.current = enhanceSig;
    await enhance();
  }

  async function submitChunk(thePrompt, chunkSeconds, refOverride) {
    const fd = new FormData();
    fd.append("prompt", thePrompt);
    fd.append("seconds", String(chunkSeconds));
    fd.append("size", size);
    const ref = refOverride || refFile;
    if (ref) fd.append("inputReference", ref);
    for (let attempt = 0; attempt < 8; attempt++) {
      const r = await fetch("/api/jobs", { method: "POST", body: fd });
      const txt = await r.text();
      if (r.ok) return JSON.parse(txt);
      if (txt.includes("Too many running tasks") || r.status === 429) {
        await sleep(5000 + attempt * 2000); continue;
      }
      throw new Error(txt.slice(0, 400));
    }
    throw new Error("Sora rate limit: too many running tasks. Try again in a minute.");
  }

  // Sora-2 typically takes 90–180s per 12s clip. Start with longer poll intervals
  // to avoid wasting round trips, then tighten as render approaches completion.
  async function poll(id, onProgress) {
    let elapsed = 0;
    while (true) {
      const wait = elapsed < 60_000 ? 6000 : elapsed < 120_000 ? 4000 : 3000;
      await sleep(wait);
      elapsed += wait;
      const r = await fetch(`/api/jobs/${id}`);
      const j = await jsonOrThrow(r);
      const st = j.status;
      if (onProgress) onProgress(st, elapsed);
      else setStatus(s => ({ ...s, label: st }));
      if (st === "succeeded" || st === "completed") return j;
      if (st === "failed" || st === "cancelled") throw new Error("Job " + st);
    }
  }

  // Build the prompt for a single segment using the structured plan + memory of
  // earlier rendered segments + outline of later ones. Each Sora-2 render thus
  // receives full narrative + audio + visual context of preceding/following clips.
  // When `bible` is supplied (after clip 1 has rendered), its empirical character
  // and scene descriptors REPLACE the LLM-imagined anchors so segments 2+ lock to
  // what Sora actually drew, not what gpt-4o-mini hoped it would draw.
  function buildSegmentPrompt(planObj, k, priorSummaries, bible) {
    const segs = planObj.segments || [];
    const seg = segs[k] || {};
    const N = segs.length;
    const useBible = !!bible && k >= 1;
    const characterLine = useBible
      ? `Character (LOCKED identity bible from clip 1 — match these features exactly): ${bible.characterDescriptor || planObj.characterAnchor || ""}\n  Wardrobe (identical to clip 1, every item): ${bible.wardrobe || ""}`
      : `Character (use this exact description anywhere the speaker is referenced): ${planObj.characterAnchor || ""}`;
    const sceneLine = useBible
      ? `Scene (locked from clip 1): ${bible.sceneDescriptor || planObj.sceneAnchor || ""}\n  Anchor palette: ${(bible.palette || []).join(", ")}\n  Lens & lighting (identical to clip 1): ${bible.lensLightingNotes || ""}`
      : `Scene: ${planObj.sceneAnchor || ""}`;
    const previously = priorSummaries.length === 0 ? "" :
      "\nPreviously (already rendered, this segment continues directly from the last):\n" +
      priorSummaries.map((s, i) => `  - Segment ${i+1} (${segs[i]?.startSec}\u2013${segs[i]?.endSec}s): ${s}`).join("\n");
    const coming = k >= N - 1 ? "" :
      "\nComing next (do NOT render, but pace toward it):\n" +
      segs.slice(k+1).map((s, i) => `  - Segment ${k+2+i} (${s.startSec}\u2013${s.endSec}s): ${s.summary || ""}`).join("\n");
    const dialogueBlock = seg.dialogue && seg.dialogue !== "null"
      ? `\nDialogue (this segment, spoken on-screen, embed verbatim):\n${seg.dialogue}`
      : "";
    const continuity = k === 0 ? ""
      : `\nContinuity directives:\n  - DIRECT CONTINUATION. The first frame matches the last frame of segment ${k} exactly.\n  - SAME character${useBible ? " — match the locked identity bible above pixel-for-pixel (face, hair, skin, every wardrobe item)" : " (use the Character anchor below verbatim)"}, SAME wardrobe, SAME environment, SAME lens & focal length, SAME lighting setup and color grade.\n  - SAME voice timbre, pitch, accent and speaking pace as the previous segment.\n  - The diegetic background sound bed continues uninterrupted: ${planObj.backgroundSound || ""}.\n  - No cut, no fade, no recap. Motion and audio pick up immediately.`;
    return [
      `Style: ${planObj.style || ""}`,
      ``,
      sceneLine,
      ``,
      characterLine,
      ``,
      `Cinematography:`,
      planObj.cinematography || "",
      ``,
      `Voice: ${planObj.voiceDescription || ""}`,
      previously,
      ``,
      `This segment is segment ${k+1} of ${N} (time ${seg.startSec}\u2013${seg.endSec}s of the full ${segs[N-1]?.endSec || ""}s arc).`,
      `Summary of this segment: ${seg.summary || ""}`,
      `Beat-by-beat actions in this segment (perform exactly these, in order):`,
      ...(seg.beats || []).map(b => `  - ${b}`),
      dialogueBlock,
      coming,
      continuity,
      ``,
      `Background sound (continues across segments, render identically): ${planObj.backgroundSound || ""}`,
      `Negative: ${planObj.negative || "no on-screen text, no captions, no logos, no watermarks, no extra speakers, no duplicated limbs"}`,
    ].filter(Boolean).join("\n");
  }

  // Extract last frame of a video URL as a JPEG File for use as Sora input_reference.
  // Fail-fast: single seek attempt with tight budget. The structured plan already
  // provides strong textual continuity, so a missing image anchor is not fatal.
  async function extractLastFrame(url, w, h) {
    const v = document.createElement("video");
    v.crossOrigin = "anonymous";
    v.muted = true;
    v.playsInline = true;
    v.preload = "auto";
    v.src = url;
    await new Promise((res, rej) => {
      const t = setTimeout(() => rej(new Error("video load timeout")), 8000);
      v.onloadedmetadata = () => { clearTimeout(t); res(); };
      v.onerror = () => { clearTimeout(t); rej(new Error("video load failed (CORS?)")); };
    });
    const dur = v.duration || 0;
    await new Promise((res, rej) => {
      const t = setTimeout(() => rej(new Error("video seek timeout")), 6000);
      v.onseeked = () => { clearTimeout(t); res(); };
      v.onerror = () => { clearTimeout(t); rej(new Error("video seek failed")); };
      try { v.currentTime = Math.max(0, dur * 0.95); } catch (e) { clearTimeout(t); rej(e); }
    });
    const canvas = document.createElement("canvas");
    canvas.width = w || v.videoWidth;
    canvas.height = h || v.videoHeight;
    canvas.getContext("2d").drawImage(v, 0, 0, canvas.width, canvas.height);
    const blob = await new Promise(res => canvas.toBlob(res, "image/jpeg", 0.92));
    if (!blob) throw new Error("canvas.toBlob returned null");
    return new File([blob], "lastframe.jpg", { type: "image/jpeg" });
  }

  // One Sora attempt: submit + poll + finalize. Returns finalized clip object.
  async function runOneClip(thePrompt, chunkSec, ref, label, basePct, spanPct) {
    setStatus(s => ({ ...s, label: `${label}: ${ref ? "with anchor, " : ""}submitting`, pct: basePct }));
    const job = await submitChunk(thePrompt, chunkSec, ref);
    // ETA: Sora-2 takes ~10s/sec of output. 12s clip ≈ 120s. Use 15s/sec as conservative ceiling.
    const etaMs = chunkSec * 15_000;
    await poll(job.id, (st, elapsed) => {
      const frac = Math.min(0.98, elapsed / etaMs);
      const ss = Math.round(elapsed / 1000);
      setStatus(s => ({ ...s, label: `${label}: ${st} (${ss}s)`, pct: basePct + spanPct * frac }));
    });
    setStatus(s => ({ ...s, label: `${label}: finalizing`, pct: basePct + spanPct }));
    const fr = await fetch(`/api/jobs/${job.id}/finalize`, { method: "POST" });
    return await jsonOrThrow(fr);
  }

  // Manual re-stitch with a chosen crossfade. Used by the "Re-stitch with crossfade" button.
  async function restitch(cfSec) {
    if (outs.length < 2) { toast("Need at least 2 clips to stitch.", true); return; }
    setStitching(true);
    try {
      const r = await fetch("/api/stitch", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ urls: outs.map(o => o.url), crossfade: cfSec })
      });
      const j = await jsonOrThrow(r);
      setStitched({ url: j.url, clips: j.clips, crossfade: j.crossfade, bytes: j.bytes });
      setCrossfade(cfSec);
      toast(cfSec > 0 ? `Re-stitched with ${cfSec}s crossfade` : "Re-stitched (hard cuts)");
      setRefreshLib(x => x + 1);
    } catch (e) { toast("Stitch failed: " + e.message, true); }
    finally { setStitching(false); }
  }

  async function run() {
    const finalText = finalPrompt.trim() || prompt.trim();
    if (!finalText) { toast("Enter a prompt first.", true); return; }
    setRunning(true); setOuts([]); setStitched(null); setSegSummaries([]); setIdentityBible(null); setStatus({ phase: "running", pct: 2, label: "submitting" });
    try {
      const usePlan = plan && Array.isArray(plan.segments) && plan.segments.length > 0;
      const chunkSize = Math.min(seconds, 12);
      const chunks = usePlan ? plan.segments.length : Math.ceil(seconds / chunkSize);
      const [W, H] = size.split("x").map(Number);
      const finals = [];
      const priorSummaries = [];
      let prevFrame = null;
      let bible = null;
      // Show ETA up front so the wait is expected, not surprising.
      const etaSec = chunks * (chunkSize <= 4 ? 60 : chunkSize <= 8 ? 100 : 150);
      const etaMin = Math.ceil(etaSec / 60);
      toast(`Rendering ${chunks} clip${chunks > 1 ? "s" : ""} · est. ~${etaMin} min on Sora-2 (sequential, 1 task/deployment)`);
      for (let i = 0; i < chunks; i++) {
        // Per-segment chunk size: in plan mode, derive from the segment's own span (clamped to 4/8/12).
        let segSec = chunkSize;
        if (usePlan) {
          const span = (plan.segments[i].endSec ?? 0) - (plan.segments[i].startSec ?? 0);
          segSec = span >= 12 ? 12 : span >= 8 ? 8 : 4;
        }
        const thePrompt = usePlan
          ? buildSegmentPrompt(plan, i, priorSummaries, bible)
          : finalText + (i === 0 ? "" : `\n\n[Segment ${i+1}/${chunks} — DIRECT CONTINUATION of the previous segment. Same character, environment, lighting, lens, color grade. SAME voice timbre, accent, pitch, pace. Same diegetic background sound bed continues uninterrupted. First frame matches previous segment's last frame; motion and audio pick up immediately with no cut, no fade, no recap.]`);
        const label = `clip ${i+1}/${chunks}`;
        const basePct = 2 + (i / chunks) * 95;
        const spanPct = (1 / chunks) * 90;
        let fj;
        try {
          fj = await runOneClip(thePrompt, segSec, prevFrame, label, basePct, spanPct);
        } catch (e) {
          // One retry without input_reference if Sora rejects the anchor ("Job failed" right after submit).
          if (prevFrame && /Job (failed|cancelled)/i.test(e.message)) {
            dbg("warn", `${label} failed with anchor — retrying without input_reference`);
            fj = await runOneClip(thePrompt, segSec, null, `${label} (retry)`, basePct, spanPct);
          } else {
            throw e;
          }
        }
        finals.push({ ...fj, seconds: segSec, size });
        setOuts([...finals]);
        if (usePlan) {
          const sum = plan.segments[i].summary || "";
          priorSummaries.push(sum);
          setSegSummaries(arr => [...arr, sum]);
        }
        // After clip 1 finalizes: lock identity by extracting empirical descriptors
        // from what Sora actually drew. This replaces the imagined characterAnchor
        // for clips 2+, which is the single biggest lever for character consistency.
        if (i === 0 && usePlan) {
          try {
            setStatus(s => ({ ...s, label: `${label}: locking identity from clip 1` }));
            const ir = await fetch("/api/identity", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ videoUrl: fj.url, originalAnchor: plan.characterAnchor || "" })
            });
            const ij = await jsonOrThrow(ir);
            if (ij && ij.bible) {
              bible = ij.bible;
              setIdentityBible(bible);
              dbg("ok", `identity bible locked: ${(bible.characterDescriptor || "").slice(0, 90)}\u2026`);
            }
          } catch (e) {
            dbg("warn", "identity bible extraction failed; falling back to text anchor", e.message);
          }
        }
        if (i < chunks - 1) {
          // Phase 2: prefer a 4s tail clip as the visual anchor (Sora-2 accepts up
          // to 5s of video as input_reference, providing far richer identity signal
          // than a single still frame). Fall back to a JPEG last-frame if /api/tail
          // or Sora rejects the video reference.
          prevFrame = null;
          try {
            setStatus(s => ({ ...s, label: `${label}: capturing 4s tail anchor` }));
            const tr = await fetch("/api/tail", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ videoUrl: fj.url, seconds: 4, size })
            });
            const tj = await jsonOrThrow(tr);
            const tailResp = await fetch(tj.url);
            if (!tailResp.ok) throw new Error(`tail download ${tailResp.status}`);
            const tailBlob = await tailResp.blob();
            prevFrame = new File([tailBlob], "tail.mp4", { type: "video/mp4" });
            dbg("ok", `4s tail anchor ready (${(tailBlob.size/1024).toFixed(0)}KB) for clip ${i+2}`);
          } catch (e) {
            dbg("warn", `tail anchor failed (${e.message}); falling back to last-frame JPEG`);
            try {
              prevFrame = await extractLastFrame(fj.url, W, H);
              dbg("ok", `last-frame captured (${prevFrame.size} bytes) for clip ${i+2} anchor`);
            } catch (e2) {
              dbg("warn", "last-frame extraction also failed; continuing with plan-based continuity only", e2.message);
              prevFrame = null;
            }
          }
        }
      }
      setStatus({ phase: "done", pct: 100, label: "ready" });
      setRefreshLib(x => x + 1);
      toast("Video ready");
      // Auto-stitch if we have multiple clips. Lossless concat by default; user can re-stitch with crossfade later.
      if (finals.length >= 2) {
        try {
          setStitching(true);
          setStatus({ phase: "running", pct: 95, label: `stitching ${finals.length} clips into one…` });
          const r = await fetch("/api/stitch", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ urls: finals.map(f => f.url), crossfade })
          });
          const j = await jsonOrThrow(r);
          setStitched({ url: j.url, clips: j.clips, crossfade: j.crossfade, bytes: j.bytes });
          setStatus({ phase: "done", pct: 100, label: "ready (stitched)" });
          dbg("ok", `stitched ${j.clips} clips → ${(j.bytes/1024/1024).toFixed(1)}MB combined`);
          toast("Combined video ready");
        } catch (e) {
          dbg("warn", "stitch failed; individual clips still available", e.message);
          toast("Stitch failed — clips are still available individually", true);
        } finally { setStitching(false); }
      }
    } catch (e) {
      setStatus({ phase: "failed", pct: 0, label: "error" });
      toast(e.message.slice(0, 200), true);
    } finally { setRunning(false); }
  }

  const recentLines = dbgLines.slice(-200);

  return html`
    <header class="app">
      <span class="dot"></span>
      <span class="title">Sora Studio</span>
      <span class="badge">sora-2 · ${size} · ${seconds}s</span>
      <div class="spacer"></div>
      <button class="ghost" onClick=${() => setTheme(theme === "light" ? "dark" : "light")} title="Toggle theme">
        ${theme === "light" ? "☾" : "☀"}
      </button>
      <button class="ghost" onClick=${() => setDrawerOpen(o => !o)} title="Debug log">
        debug${dbgLines.length > 0 ? html` <span class="pill">${dbgLines.length}</span>` : ""}
      </button>
    </header>

    <main>
      <!-- LEFT: Compose -->
      <div>
        <div class="card">
          <h3>Compose</h3>
          <div class="stack">
            <div>
              <label>Idea / prompt</label>
              <textarea rows="3" placeholder="A child running on a beach at sunset, crabs scattering"
                value=${prompt} onInput=${e => setPrompt(e.target.value)}></textarea>
            </div>
            <div>
              <label>Narration line (optional, in your idea language — will be translated)</label>
              <textarea rows="2" placeholder="Help Pritam, crabs are everywhere!"
                value=${narration} onInput=${e => setNarration(e.target.value)}></textarea>
            </div>
            <div style=${{display:"flex",gap:8,alignItems:"center"}}>
              <button class="primary" onClick=${enhanceClick} disabled=${enhancing || !prompt.trim()}>
                ${enhancing ? "Enhancing…" : "✨ Generate cinematic prompt"}
              </button>
              <span class="muted small">Frame-by-frame, scales with duration & voice</span>
            </div>
            ${finalPrompt && html`
              <div>
                <label>Final prompt preview <span class="muted">(editable; only used if plan is empty)</span></label>
                <textarea class="final" value=${finalPrompt} onInput=${e => setFinalPrompt(e.target.value)}></textarea>
              </div>
            `}
            ${plan && Array.isArray(plan.segments) && plan.segments.length > 1 && html`
              <div class="plan">
                <div class="plan-head">
                  <strong>Story plan</strong>
                  <span class="pill">${plan.segments.length} segments</span>
                  ${identityBible && html`<span class="pill ok small" title=${identityBible.characterDescriptor || ""}>identity locked from clip 1</span>`}
                  <span class="muted small">Each clip carries memory of earlier clips + pacing toward later ones</span>
                </div>
                ${plan.segments.map((s, i) => {
                  const done = i < segSummaries.length;
                  return html`
                    <div class=${"plan-seg" + (done ? " done" : "")} key=${i}>
                      <div class="plan-seg-head">
                        <span class="pill">${i+1}</span>
                        <span class="muted small">${s.startSec}–${s.endSec}s</span>
                        <span class="plan-seg-summary">${s.summary || ""}</span>
                        ${done && html`<span class="pill ok small">rendered</span>`}
                      </div>
                      <ul class="plan-beats">
                        ${(s.beats || []).map((b, j) => html`<li key=${j}>${b}</li>`)}
                      </ul>
                      ${s.dialogue && s.dialogue !== "null" && html`<div class="plan-dialogue"><em>Dialogue:</em> ${s.dialogue}</div>`}
                    </div>
                  `;
                })}
              </div>
            `}
          </div>
        </div>

        <div class="card">
          <Accordion title="Settings" defaultOpen=${true}>
            <div class="row">
              <div>
                <label>Duration</label>
                <select value=${seconds} onChange=${e => setSeconds(Number(e.target.value))}>
                  ${DURATIONS.map(d => html`<option value=${d.v}>${d.label}</option>`)}
                </select>
              </div>
              <div>
                <label>Aspect</label>
                <select value=${size} onChange=${e => setSize(e.target.value)}>
                  ${SIZES.map(s => html`<option value=${s}>${s === "1280x720" ? "Landscape 16:9" : "Vertical 9:16"}</option>`)}
                </select>
              </div>
            </div>
            <div style=${{marginTop:12}}>
              <label>Narration voice (governs language for the spoken line)</label>
              <select value=${voice} onChange=${e => setVoice(e.target.value)}>
                ${Object.entries(voiceGroups).map(([g, list]) => list.length > 0 && html`
                  <optgroup label=${g} key=${g}>
                    ${list.map(v => html`<option value=${v.shortName} key=${v.shortName}>${v.localName || v.shortName} (${v.gender || "?"})</option>`)}
                  </optgroup>
                `)}
              </select>
            </div>
          </Accordion>
          <Accordion title="Reference image (optional)">
            <input type="file" accept="image/*" onChange=${e => setRefFile(e.target.files[0] || null)} />
            ${refFile && html`<div class="muted small" style=${{marginTop:6}}>${refFile.name} (${(refFile.size/1024).toFixed(0)} KB)</div>`}
          </Accordion>
        </div>

        <div class="card">
          <div style=${{display:"flex",gap:10,alignItems:"center"}}>
            <button class="primary" onClick=${run} disabled=${running || (!prompt.trim() && !finalPrompt.trim())}>
              ${running ? "Generating…" : "▶ Generate video"}
            </button>
            <span class="pill ${status.phase === "failed" ? "err" : status.phase === "done" ? "ok" : ""}">${status.label}</span>
          </div>
          ${(running || status.pct > 0) && html`<div class="progress"><div style=${{width: status.pct + "%"}}></div></div>`}
        </div>
      </div>

      <!-- RIGHT: Preview + Library -->
      <div>
        <div class="card">
          <h3>Preview</h3>
          <div class="preview">
            ${(() => {
              const headline = stitched?.url || (outs.length > 0 ? outs[outs.length-1].url : null);
              if (!headline) return html`<div class="empty">Your video will appear here.</div>`;
              return html`<video src=${headline} controls autoplay loop></video>`;
            })()}
          </div>
          ${stitched && html`
            <div class="meta" style=${{flexWrap:"wrap"}}>
              <span class="pill ok">combined · ${stitched.clips} clips · ${stitched.crossfade > 0 ? stitched.crossfade + "s crossfade" : "hard cuts"} · ${(stitched.bytes/1024/1024).toFixed(1)}MB</span>
              <a href=${stitched.url} target="_blank" rel="noopener">download ↗</a>
            </div>
          `}
          ${outs.length >= 2 && html`
            <div class="meta" style=${{flexWrap:"wrap",gap:6}}>
              <span style=${{opacity:.7,marginRight:6}}>Transition:</span>
              <button class="ghost" disabled=${stitching} onClick=${() => restitch(0)} title="Lossless concat, ~1s. Best when last-frame anchor worked.">hard cut</button>
              <button class="ghost" disabled=${stitching} onClick=${() => restitch(0.3)} title="Re-encodes the whole video. ~30s on F1.">0.3s xfade</button>
              <button class="ghost" disabled=${stitching} onClick=${() => restitch(0.5)} title="Re-encodes the whole video. ~30s on F1.">0.5s xfade</button>
              ${stitching && html`<span class="pill">stitching…</span>`}
            </div>
          `}
          ${outs.length > 0 && html`
            <div class="meta">
              ${outs.map((o, i) => html`<a href=${o.url} target="_blank" rel="noopener" key=${i}>clip ${i+1}/${outs.length} ↗</a>`)}
              <span>${seconds}s · ${size}</span>
            </div>
          `}
        </div>
        <${Library} refreshKey=${refreshLib} onSelect=${v => { setOuts([{ url: v.url, name: v.name, seconds, size }]); setStitched(null); toast("Loaded " + v.name); }} />
      </div>
    </main>

    <div class=${"drawer" + (drawerOpen ? " open" : "")}>
      <div class="head" onClick=${() => setDrawerOpen(o => !o)}>
        <strong style=${{fontSize:12,letterSpacing:".04em",textTransform:"uppercase"}}>Debug log</strong>
        <span class="pill">${dbgLines.length}</span>
        <span style=${{flex:1}}></span>
        <button class="ghost small" onClick=${e => { e.stopPropagation(); navigator.clipboard.writeText(recentLines.map(l => `[${l.t}] ${l.level} ${l.label}${l.detail ? "\n  " + l.detail : ""}`).join("\n")); toast("Copied"); }}>copy</button>
        <button class="ghost small" onClick=${e => { e.stopPropagation(); dbgLines.length = 0; force(x => x+1); }}>clear</button>
        <span style=${{fontSize:11,color:"var(--muted)"}}>${drawerOpen ? "▼" : "▲"}</span>
      </div>
      <div class="body">
        ${recentLines.length === 0
          ? html`<div class="muted">No events yet.</div>`
          : recentLines.slice().reverse().map((l, i) => html`
              <div class=${"line " + l.level} key=${i}>
                <span class="lvl">${l.level}</span> [${l.t}] ${l.label}${l.detail ? "\n  " + l.detail : ""}
              </div>
            `)}
      </div>
    </div>
  `;
}

createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
