<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoTool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #0f1419;
      color: #e0e6ed;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid #2a2f3a;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #1a1f2e;
      border: 1px solid #2a3f5a;
      border-radius: 999px;
      font-size: 12px;
      color: #a0aec0;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #48bb78;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: #16202d;
      border: 1px solid #2a3f5a;
      border-radius: 12px;
      padding: 28px;
    }

    .panel h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #e0e6ed;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 20px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #cbd5e0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    textarea {
      background: #0f1419;
      border: 1px solid #2a3f5a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e6ed;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      background: #1a2332;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 100%;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #2a3f5a;
      color: #cbd5e0;
      border: 1px solid #3a4f6a;
      width: 100%;
      margin-top: 8px;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #3a4f6a;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    .video-item {
      position: relative;
      background: #0f1419;
      border: 1px solid #2a3f5a;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
    }

    .video-item:hover {
      border-color: #667eea;
      transform: translateY(-2px);
    }

    .video-thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      background: #0a0f18;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #4a5568;
    }

    .video-info {
      padding: 8px;
      font-size: 11px;
      color: #a0aec0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loading {
      text-align: center;
      color: #718096;
      font-size: 13px;
    }

    .error {
      background: #742a2a;
      border: 1px solid #b7273b;
      color: #fc8181;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .preview {
      width: 100%;
      aspect-ratio: 16/9;
      background: #0a0f18;
      border: 1px solid #2a3f5a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a5568;
      margin-bottom: 16px;
      font-size: 48px;
    }

    .video-item.selected {
      border-color: #667eea;
      background: #1a2332;
    }

    .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.6);
      color: #fc8181;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .video-item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      background: #742a2a;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">🎬 VideoTool</div>
      <div class="status-pill">
        <div class="status-dot"></div>
        Ready
      </div>
    </header>

    <div class="main">
      <!-- Create Section -->
      <div class="panel">
        <h2>Create New Video</h2>
        
        <div id="error" class="error" style="display: none;"></div>

        <div class="input-group">
          <label for="prompt">Story Prompt</label>
          <textarea id="prompt" placeholder="Describe your story idea..."></textarea>
        </div>

        <button class="btn-primary" onclick="createVideo()" id="createBtn">
          ✨ Generate Video
        </button>
        
        <button class="btn-secondary" onclick="loadVideos()">
          🔄 Refresh Videos
        </button>
      </div>

      <!-- History Section -->
      <div class="panel">
        <h2>Video History</h2>
        
        <div id="videosList" class="videos-grid">
          <div class="loading">Loading videos...</div>
        </div>

        <div id="preview" class="preview" style="display: none;">
          <span>No video selected</span>
        </div>

        <button class="btn-secondary" id="deleteBtn" onclick="deleteSelectedVideo()" style="display: none;">
          🗑️ Delete Selected
        </button>
      </div>
    </div>
  </div>

  <script>
    let selectedVideo = null;

    async function createVideo() {
      const prompt = document.getElementById('prompt').value.trim();
      const errorEl = document.getElementById('error');
      
      if (!prompt) {
        errorEl.textContent = 'Please enter a story prompt';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      const btn = document.getElementById('createBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Creating...';

      try {
        const response = await fetch('/api/videos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        document.getElementById('prompt').value = '';
        await loadVideos();
        errorEl.textContent = '✅ Video generation started!';
        errorEl.style.display = 'block';
      } catch (e) {
        errorEl.textContent = '❌ ' + (e.message || 'Failed to create video');
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '✨ Generate Video';
      }
    }

    async function loadVideos() {
      const listEl = document.getElementById('videosList');
      listEl.innerHTML = '<div class="loading">Loading videos...</div>';

      try {
        const response = await fetch('/api/videos');
        if (!response.ok) throw new Error(`Server error: ${response.status}`);
        
        const data = await response.json();
        const videos = data.videos || [];

        if (videos.length === 0) {
          listEl.innerHTML = '<div class="loading">No videos yet. Create one above!</div>';
          return;
        }

        listEl.innerHTML = videos.map(v => `
          <div class="video-item" onclick="selectVideo(this, '${v.name}')">
            <div class="video-thumbnail">🎬</div>
            <div class="video-info">${formatDate(v.createdOn || v.lastModified)}</div>
            <button class="delete-btn" onclick="deleteVideo(event, '${v.name}')">Delete</button>
          </div>
        `).join('');
      } catch (e) {
        listEl.innerHTML = `<div class="loading">Failed to load videos: ${e.message}</div>`;
      }
    }

    function selectVideo(el, name) {
      document.querySelectorAll('.video-item').forEach(v => v.classList.remove('selected'));
      el.classList.add('selected');
      selectedVideo = name;
      document.getElementById('deleteBtn').style.display = 'block';
    }

    async function deleteVideo(event, name) {
      event.stopPropagation();
      if (!confirm('Delete this video?')) return;

      try {
        const path = name.split('/').map(encodeURIComponent).join('/');
        const response = await fetch(`/api/videos/${path}`, { method: 'DELETE' });
        if (!response.ok) throw new Error(`Server error: ${response.status}`);
        await loadVideos();
      } catch (e) {
        alert('Failed to delete: ' + e.message);
      }
    }

    function deleteSelectedVideo() {
      if (!selectedVideo) return;
      const items = Array.from(document.querySelectorAll('.video-item.selected'));
      if (items.length > 0) {
        const btn = items[0].querySelector('.delete-btn');
        if (btn) deleteVideo({ stopPropagation: () => {} }, selectedVideo);
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'Unknown';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    // Load videos on page load
    window.addEventListener('load', loadVideos);

    // Health check
    fetch('/health').then(r => r.json()).catch(e => console.error('Health check failed:', e));
  </script>
</body>
</html>
