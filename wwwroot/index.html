<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>avideo</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://esm.sh" />
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface-2: #f1f1ee;
    --border: #e3e3df;
    --text: #1c1d22;
    --muted: #6b6f76;
    --accent: #2f6df4;
    --accent-soft: #e6efff;
    --danger: #c5301f;
    --warn: #b8770b;
    --ok: #1a8451;
    --shadow: 0 1px 2px rgba(20,20,25,.04), 0 8px 24px rgba(20,20,25,.06);
    --radius: 14px;
    --radius-sm: 10px;
    --mono: ui-monospace, SF Mono, Menlo, Consolas, monospace;
  }
  html[data-theme="dark"] {
    --bg: #0f1115;
    --surface: #16181d;
    --surface-2: #1d2026;
    --border: #2a2d35;
    --text: #e8eaf0;
    --muted: #9aa0ac;
    --accent: #6ea0ff;
    --accent-soft: #1d2a44;
    --danger: #ff7466;
    --warn: #f0b454;
    --ok: #58c79b;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }
  button, input, select, textarea {
    font: inherit; color: inherit;
  }
  button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  button:hover:not(:disabled) { background: var(--surface-2); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  button.primary:hover:not(:disabled) { filter: brightness(1.05); }
  button.ghost { background: transparent; border-color: transparent; }
  button.ghost:hover:not(:disabled) { background: var(--surface-2); }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 9px 11px; border-radius: var(--radius-sm); outline: none;
    transition: border-color .12s, box-shadow .12s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea { resize: vertical; min-height: 64px; font-family: inherit; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }

  header.app {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: saturate(140%) blur(10px);
    background: color-mix(in srgb, var(--bg) 80%, transparent);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 12px;
  }
  header.app .title { font-weight: 600; font-size: 15px; letter-spacing: -.01em; }
  header.app .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  header.app .spacer { flex: 1; }
  header.app .badge { font-size: 11px; color: var(--muted); padding: 3px 8px;
    background: var(--surface-2); border-radius: 999px; }

  main { max-width: 1280px; margin: 0 auto; padding: 24px;
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr); gap: 24px;
    align-items: start; }
  @media (max-width: 980px) { main { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 18px;
  }
  .card + .card { margin-top: 16px; }
  .card h3 { margin: 0 0 12px; font-size: 13px; font-weight: 600; letter-spacing: .02em;
    text-transform: uppercase; color: var(--muted); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row.three { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 600px) { .row, .row.three { grid-template-columns: 1fr; } }

  .accordion-item { border-top: 1px solid var(--border); }
  .accordion-item:first-child { border-top: 0; }
  .accordion-head { display: flex; align-items: center; gap: 8px; padding: 12px 0; cursor: pointer;
    user-select: none; font-weight: 500; }
  .accordion-head .chev { color: var(--muted); transition: transform .15s; }
  .accordion-item.open .chev { transform: rotate(90deg); }
  .accordion-body { padding: 4px 0 16px; }

  .stack { display: flex; flex-direction: column; gap: 12px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px;
    background: var(--surface-2); border-radius: 999px; font-size: 11px; color: var(--muted); }
  .pill.ok { color: var(--ok); }
  .pill.err { color: var(--danger); }
  .pill.warn { color: var(--warn); }

  .preview { aspect-ratio: 16/9; background: #0a0a0c; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    border: 1px solid var(--border); }
  .preview .empty { color: #777; font-size: 13px; }
  .preview video { width: 100%; height: 100%; object-fit: contain; }

  .progress { height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden;
    margin-top: 10px; }
  .progress > div { height: 100%; background: var(--accent); width: 0; transition: width .3s; }

  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; font-size: 12px; color: var(--muted); }
  .meta a, .meta span { background: var(--surface-2); padding: 4px 9px; border-radius: 8px;
    text-decoration: none; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
  .clip { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    overflow: hidden; cursor: pointer; transition: transform .12s, border-color .12s;
    padding: 0; text-align: left; font: inherit; color: inherit; }
  .clip:hover { border-color: var(--accent); transform: translateY(-1px); }
  .clip video { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #000; }
  .clip .name { font-size: 11px; padding: 6px 8px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--mono); }

  /* Final prompt big editable */
  textarea.final { font-family: var(--mono); font-size: 12.5px; min-height: 240px; }

  /* Story plan */
  .plan { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; background: var(--surface-2); }
  .plan-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .plan-seg { border-top: 1px dashed var(--border); padding: 8px 4px; }
  .plan-seg:first-of-type { border-top: 0; }
  .plan-seg.done { opacity: 0.65; }
  .plan-seg-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .plan-seg-summary { font-weight: 500; }
  .plan-beats { margin: 6px 0 0 24px; padding: 0; font-size: 12.5px; color: var(--muted); }
  .plan-beats li { margin: 2px 0; }
  .plan-dialogue { font-size: 12.5px; margin: 4px 0 0 24px; color: var(--text); }

  /* Toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: 999px;
    font-size: 13px; box-shadow: var(--shadow); z-index: 100; opacity: 0; transition: opacity .2s;
    pointer-events: none; max-width: 90vw; }
  .toast.show { opacity: 1; }
  .toast.err { background: var(--danger); color: white; }

  /* Debug drawer */
  .drawer { position: fixed; bottom: 0; right: 0; width: min(560px, 100vw);
    max-height: 50vh; background: var(--surface); border-top-left-radius: var(--radius);
    border: 1px solid var(--border); border-right: 0; border-bottom: 0;
    box-shadow: var(--shadow); display: flex; flex-direction: column; z-index: 60;
    transform: translateY(calc(100% - 36px)); transition: transform .2s;
  }
  .drawer.open { transform: translateY(0); }
  .drawer .head { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .drawer .body { flex: 1; overflow: auto; padding: 8px 12px; font: 11px/1.45 var(--mono); }
  .drawer .body .line { padding: 3px 0; border-bottom: 1px dashed var(--border); white-space: pre-wrap; word-break: break-word; }
  .drawer .body .line .lvl { display: inline-block; width: 44px; font-weight: 600; }
  .drawer .body .line.error .lvl { color: var(--danger); }
  .drawer .body .line.warn .lvl  { color: var(--warn); }
  .drawer .body .line.net .lvl   { color: var(--accent); }
  .drawer .body .line.ok .lvl    { color: var(--ok); }
  .drawer .body .line.info .lvl  { color: var(--muted); }

  details summary { cursor: pointer; }
  hr.sep { border: 0; border-top: 1px solid var(--border); margin: 14px 0; }
  .muted { color: var(--muted); }
  .small { font-size: 12px; }

  /* ---------- Mobile-friendly tweaks ----------
     Goals: prevent iOS zoom-on-focus (16px inputs), enlarge touch targets to
     ≥44px, tighten paddings, let buttons & rows wrap, make the debug drawer
     full-width, and keep the preview comfortably sized on phones. */
  @media (max-width: 720px) {
    main { padding: 12px; gap: 14px; }
    header.app { padding: 10px 12px; gap: 8px; }
    header.app .badge { display: none; }
    .card { padding: 14px; border-radius: 12px; }
    .card + .card { margin-top: 12px; }
    .card h3 { font-size: 12px; margin-bottom: 10px; }

    /* iOS zooms any input < 16px on focus — bump to 16px and keep mono fields readable. */
    input[type="text"], input[type="number"], select, textarea { font-size: 16px; padding: 11px 12px; }
    textarea.final { font-size: 13px; min-height: 180px; }
    textarea { min-height: 80px; }

    /* Bigger tap targets, allow wrapping, equal-width by default. */
    button { padding: 11px 14px; min-height: 44px; }
    .btn-row, .row-buttons, .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn-row > button, .row-buttons > button, .actions > button { flex: 1 1 calc(50% - 4px); min-width: 0; }

    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .clip video { aspect-ratio: 16/9; }

    /* Debug drawer: full-width sheet that slides up; collapse handle visible. */
    .drawer { width: 100vw; max-height: 60vh; border-radius: 12px 12px 0 0;
      border-left: 0; border-right: 0; }
    .drawer .body { font-size: 12px; }

    /* Toast clears the drawer collapsed handle. */
    .toast { bottom: 56px; font-size: 13px; padding: 10px 14px; }

    /* Plan + meta wrap nicely. */
    .plan { padding: 8px; }
    .plan-beats { margin-left: 16px; }
    .plan-dialogue { margin-left: 16px; }
    .meta { gap: 6px; font-size: 11px; }

    /* Accordion heads tappable. */
    .accordion-head { padding: 14px 0; min-height: 44px; }
  }

  @media (max-width: 420px) {
    main { padding: 10px; }
    .card { padding: 12px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    /* On the smallest phones, give each action button its own row for clarity. */
    .btn-row > button, .row-buttons > button, .actions > button { flex-basis: 100%; }
    header.app .title { font-size: 14px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>

<script type="importmap">
{ "imports": {
  "react": "https://esm.sh/react@18.3.1",
  "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
  "htm": "https://esm.sh/htm@3.1.1/react?external=react"
}}
</script>

<script type="module">
import React, { useState, useEffect, useRef, useCallback, useMemo } from "react";
import { createRoot } from "react-dom/client";
import { html } from "htm";

// ---------- debug log ----------
const dbgListeners = new Set();
const dbgLines = [];
function dbg(level, label, detail) {
  const t = new Date().toLocaleTimeString();
  const line = { t, level, label, detail };
  dbgLines.push(line);
  if (dbgLines.length > 500) dbgLines.shift();
  dbgListeners.forEach(fn => fn());
}
const _fetch = window.fetch.bind(window);
window.fetch = async (input, init) => {
  const url = typeof input === "string" ? input : input.url;
  const method = (init?.method || (typeof input === "object" && input.method) || "GET").toUpperCase();
  const t0 = performance.now();
  try {
    const r = await _fetch(input, init);
    const ms = (performance.now() - t0).toFixed(0);
    if (!r.ok) {
      let body = ""; try { body = (await r.clone().text()).slice(0, 1500); } catch {}
      dbg("error", `${method} ${url} → ${r.status} (${ms}ms)`, body);
    } else {
      dbg("net", `${method} ${url} → ${r.status} (${ms}ms)`);
    }
    return r;
  } catch (e) {
    const ms = (performance.now() - t0).toFixed(0);
    dbg("error", `${method} ${url} → network failure (${ms}ms)`, String(e));
    throw e;
  }
};
window.addEventListener("error", e => dbg("error", e.message,
  `${e.filename}:${e.lineno}:${e.colno}\n${e.error?.stack || ""}`));
window.addEventListener("unhandledrejection", e => {
  const msg = String(e.reason?.message || e.reason || "");
  // Benign: HTMLMediaElement aborts a pending play() when we pause/seek to grab last frame.
  if (/play\(\) request was interrupted/i.test(msg)) { e.preventDefault(); return; }
  dbg("error", "unhandledrejection", String(e.reason?.stack || msg));
});

// ---------- toast ----------
function toast(msg, isErr) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = "toast show" + (isErr ? " err" : "");
  setTimeout(() => el.classList.remove("show"), 2600);
  dbg(isErr ? "error" : "info", msg);
}

// ---------- helpers ----------
const SIZES = ["1280x720", "720x1280"];
const DURATIONS = [
  { v: 4, label: "4s" }, { v: 8, label: "8s" }, { v: 12, label: "12s" },
  { v: 24, label: "24s (×2)" }, { v: 36, label: "36s (×3)" }, { v: 48, label: "48s (×4)" },
];

// Interruptible sleep: when the tab is backgrounded on mobile, browsers throttle
// setTimeout (often to 1×/min) which makes long render polls appear "dead".
// We track every pending sleep so wakeAllSleeps() — fired on visibilitychange to
// `visible` — resolves them all immediately, snapping the poll loop back to life
// the instant the user returns to the tab.
const _pendingSleeps = new Set();
function sleep(ms) {
  return new Promise(resolve => {
    let done = false;
    const fire = () => { if (done) return; done = true; clearTimeout(t); _pendingSleeps.delete(fire); resolve(); };
    const t = setTimeout(fire, ms);
    _pendingSleeps.add(fire);
  });
}
function wakeAllSleeps() {
  for (const fn of Array.from(_pendingSleeps)) { try { fn(); } catch {} }
}
if (typeof document !== "undefined") {
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") wakeAllSleeps();
  });
  // Also wake on focus (covers some mobile browsers that don't fire visibilitychange reliably).
  window.addEventListener("focus", wakeAllSleeps);
  window.addEventListener("pageshow", wakeAllSleeps);
}

// Module-level latch so we only redirect to login once even if many fetches
// race a 401 simultaneously (every API call funnels through jsonOrThrow).
let _loginRedirecting = false;
function redirectToLogin() {
  if (_loginRedirecting) return;
  _loginRedirecting = true;
  const back = encodeURIComponent(location.pathname + location.search + location.hash);
  location.href = "/.auth/login/aad?post_login_redirect_url=" + back;
}
async function jsonOrThrow(r) {
  if (r.status === 401) {
    // Easy Auth says the session is missing/expired. Hand off to the IdP;
    // throw so the caller's error path doesn't run anything destructive
    // before navigation (caller will be unmounted within ms anyway).
    redirectToLogin();
    throw new Error("redirecting to login");
  }
  const txt = await r.text();
  if (!r.ok) throw new Error(txt.slice(0, 400) || `HTTP ${r.status}`);
  try { return JSON.parse(txt); } catch { return txt; }
}

// Decode the URL-safe base64 VAPID public key the server returns into the
// Uint8Array form pushManager.subscribe() expects.
function urlBase64ToUint8Array(b64) {
  const padding = "=".repeat((4 - b64.length % 4) % 4);
  const std = (b64 + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(std);
  const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
  return out;
}

// ---------- App ----------
function useTheme() {
  const [theme, setTheme] = useState(() => localStorage.getItem("theme") || "light");
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("theme", theme);
  }, [theme]);
  return [theme, setTheme];
}

function Accordion({ title, children, defaultOpen }) {
  const [open, setOpen] = useState(!!defaultOpen);
  return html`
    <div class=${"accordion-item" + (open ? " open" : "")}>
      <div class="accordion-head" onClick=${() => setOpen(o => !o)}>
        <span class="chev">▸</span>
        <span>${title}</span>
      </div>
      ${open && html`<div class="accordion-body">${children}</div>`}
    </div>
  `;
}

function Library({ refreshKey, onSelect }) {
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [deleting, setDeleting] = useState("");
  const load = useCallback(async () => {
    setLoading(true); setErr("");
    try {
      const r = await fetch("/api/videos?limit=10");
      const j = await jsonOrThrow(r);
      setVideos(j.videos || []);
    } catch (e) { setErr(e.message); }
    finally { setLoading(false); }
  }, []);
  const del = useCallback(async (v) => {
    if (!window.confirm("Delete this video permanently?")) return;
    setDeleting(v.name);
    try {
      const path = v.name.split("/").map(encodeURIComponent).join("/");
      const r = await fetch("/api/videos/" + path, { method: "DELETE" });
      await jsonOrThrow(r);
      setVideos(prev => prev.filter(x => x.name !== v.name));
      toast("Video deleted");
    } catch (e) { toast("Delete failed: " + (e.message || "").slice(0, 140), true); }
    finally { setDeleting(""); }
  }, []);
  useEffect(() => { load(); }, [load, refreshKey]);
  return html`
    <div class="card">
      <h3 style=${{display:"flex",alignItems:"center",gap:8}}>
        Earlier videos
        <span class="pill">${videos.length}</span>
        <span style=${{flex:1}}></span>
        <button class="ghost small" onClick=${load} disabled=${loading}>${loading ? "…" : "↻ Refresh"}</button>
      </h3>
      ${err && html`<div class="pill err small">${err}</div>`}
      ${!loading && videos.length === 0 && html`<div class="muted small">No videos yet. Generate one above.</div>`}
      <div class="grid">
        ${videos.map(v => html`
          <div
            class="clip"
            key=${v.name}
            role="button"
            tabindex="0"
            style=${{position:"relative",cursor:"pointer"}}
            title=${v.name + " — click to load in preview"}
            onClick=${() => onSelect && onSelect(v)}
            onKeyDown=${e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onSelect && onSelect(v); } }}>
            <video src=${v.url} muted preload="metadata"
              onMouseEnter=${e => { try { e.currentTarget.currentTime = 0.1; e.currentTarget.play(); } catch{} }}
              onMouseLeave=${e => { e.currentTarget.pause(); }}></video>
            <div class="name">${new Date(v.createdOn || v.lastModified).toLocaleString()}</div>
            ${(v.title || v.prompt) ? html`
              <div style=${{padding:"6px 8px",borderTop:"1px solid var(--border)"}}>
                ${v.title && html`<div style=${{fontSize:12,fontWeight:600,lineHeight:1.3,whiteSpace:"normal"}}>${v.title}</div>`}
                ${v.prompt && html`<div class="muted" style=${{fontSize:11,lineHeight:1.35,marginTop:2,whiteSpace:"normal"}} title=${v.prompt}>${v.prompt.length > 160 ? v.prompt.slice(0,160) + "…" : v.prompt}</div>`}
              </div>
            ` : ""}
            <button type="button" title="Delete this video" aria-label="Delete video"
              disabled=${deleting === v.name}
              onClick=${e => { e.stopPropagation(); del(v); }}
              style=${{position:"absolute",top:6,right:6,border:"none",borderRadius:6,cursor:"pointer",background:"rgba(0,0,0,.6)",color:"#fff",fontSize:13,lineHeight:1,padding:"4px 6px"}}>
              ${deleting === v.name ? "…" : "🗑"}
            </button>
          </div>
        `)}
      </div>
    </div>
  `;
}

function App() {
  const [theme, setTheme] = useTheme();
  const [voices, setVoices] = useState([]);
  const [voice, setVoice] = useState("en-US-AvaMultilingualNeural");

  // ── Story Chain (I2V continuation) ────────────────────────────────────────
  // The headline continuation feature: one user idea + one character image →
  // a story spread across N=ceil(total/5) clips, each rendered image-to-video
  // from the PREVIOUS clip's last frame, so the character + scene carry forward.
  const [scPrompt, setScPrompt] = useState("");
  const [scTotalSec, setScTotalSec] = useState(30);     // total film length
  const [scAspect, setScAspect] = useState("landscape"); // landscape→832x480, vertical→480x832 (480p = fast chaining)
  const [scCharFile, setScCharFile] = useState(null);    // character image File
  const [scCharPreview, setScCharPreview] = useState(null); // object URL for preview
  const [scStory, setScStory] = useState(null);          // { title, logline, subject, style, setting, clips:[...] }
  const [scBuilding, setScBuilding] = useState(false);   // storyboard generation in flight
  const [scProgress, setScProgress] = useState([]);      // per-clip [{index,title,status,clipUrl,startUrl}]
  const [scCast, setScCast] = useState([]);              // casting sheet [{id,name,description,refName,previewUrl,status}]
  const [scCasting, setScCasting] = useState(false);     // generating canonical reference snapshots
  const scSize = scAspect === "vertical" ? "480x832" : "832x480";
  const scClipSec = Math.min(5, Math.max(3, Number(scStory?.clipSeconds) || 5));
  const scClipCount = scStory?.clips?.length || Math.ceil(scTotalSec / 5);
  const scCastReady = Array.isArray(scCast) && scCast.length > 0 && scCast.every(c => c.refName);

  // Narration (audio) laid over the finished film.

  // Wake Lock: keep the screen on during generation so mobile browsers don't
  // suspend the tab when the user puts the phone down. The lock auto-releases
  // when the tab goes to background; we re-acquire it on visibilitychange.
  // Falls back gracefully on browsers without the API (older Safari, etc.).
  const wakeLockRef = useRef(null);
  useEffect(() => {
    let cancelled = false;
    async function acquire() {
      if (!running) return;
      if (!("wakeLock" in navigator)) { dbg("warn", "wakeLock API not available — screen may sleep during render"); return; }
      try {
        const lock = await navigator.wakeLock.request("screen");
        if (cancelled) { try { await lock.release(); } catch {} return; }
        wakeLockRef.current = lock;
        lock.addEventListener("release", () => { dbg("info", "wakeLock released by browser"); });
        dbg("ok", "wakeLock acquired — screen will stay on while rendering");
      } catch (e) { dbg("warn", `wakeLock request failed: ${e.message}`); }
    }
    async function release() {
      const lock = wakeLockRef.current; wakeLockRef.current = null;
      if (lock) { try { await lock.release(); } catch {} }
    }
    if (running) {
      acquire();
      // Re-acquire when the user returns to the tab (Wake Lock is auto-released on hide).
      const onVis = () => { if (document.visibilityState === "visible" && running && !wakeLockRef.current) acquire(); };
      document.addEventListener("visibilitychange", onVis);
      return () => { cancelled = true; document.removeEventListener("visibilitychange", onVis); release(); };
    } else {
      release();
    }
  }, [running]);

  // Web Push: register the service worker once on mount. The SW receives push
  // events from our backend and shows a lock-screen / status-bar notification
  // when each render chunk completes (so the user knows to come back to the tab,
  // where Wake Lock + interruptible-sleep resume the next chunk). Notification
  // permission is asked lazily — only the first time `run()` is started, so we
  // never prompt unsolicited.
  const swRegRef = useRef(null);
  const pushSubRef = useRef(null);
  useEffect(() => {
    if (!("serviceWorker" in navigator)) { dbg("warn", "Service Worker API unavailable — no lock-screen notifications"); return; }
    navigator.serviceWorker.register("/sw.js").then(reg => {
      swRegRef.current = reg;
      dbg("ok", "service worker registered");
    }).catch(e => dbg("warn", `service worker register failed: ${e.message}`));
    // Listen for taps on the OS notification — the SW posts a message to us so
    // we can immediately wake any pending poll sleep and re-poll the job.
    const onMsg = (e) => {
      if (e.data?.type === "avideo:notification-click" || e.data?.type === "videotool:notification-click") {
        dbg("info", `notification tapped (jobId=${e.data.jobId || "?"}) — kicking poll`);
        wakeAllSleeps();
      }
    };
    navigator.serviceWorker.addEventListener("message", onMsg);
    return () => navigator.serviceWorker.removeEventListener("message", onMsg);
  }, []);

  // Helper: ensure notification permission, ensure a PushSubscription exists,
  // and bind it to a specific render job ID server-side so the server pushes a
  // notification when that job completes. Best-effort — silent on failure so a
  // missing-API browser (iOS Safari without PWA install, Firefox private mode)
  // never blocks the render.
  async function pushSubscribeForJob(jobId, label) {
    try {
      if (!("Notification" in window)) return;
      if (!swRegRef.current) return;
      if (Notification.permission === "default") {
        try { await Notification.requestPermission(); } catch {}
      }
      if (Notification.permission !== "granted") return;
      let sub = pushSubRef.current || await swRegRef.current.pushManager.getSubscription();
      if (!sub) {
        const r = await fetch("/api/push/vapid-public-key");
        const { publicKey } = await jsonOrThrow(r);
        sub = await swRegRef.current.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        });
        dbg("ok", `push subscription created (${sub.endpoint.slice(0, 60)}…)`);
      }
      pushSubRef.current = sub;
      const json = sub.toJSON();
      await fetch("/api/push/subscribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          jobId, label,
          endpoint: json.endpoint,
          keys: { p256dh: json.keys.p256dh, auth: json.keys.auth },
        }),
      });
      dbg("ok", `push notifier armed for ${label} (jobId ${jobId.slice(0, 8)}…)`);
    } catch (e) { dbg("warn", `push subscribe failed (${e.message}) — render will still work, just no lock-screen notification`); }
  }

  // ── Language is a first-class choice ──────────────────────────────────────
  // The user picks ONE language for the whole film. That single choice drives the
  // narrator voice, every character voice and the storyboard language, so the
  // voiceover is always spoken in the chosen language (never silently English).
  function localeOf(v) { const p = String(v || "en-US").split("-"); return p.length >= 2 ? `${p[0]}-${p[1]}` : "en-US"; }
  function langLabel(loc) {
    try {
      const [l, r] = String(loc).split("-");
      const ln = new Intl.DisplayNames(["en"], { type: "language" }).of(l) || l;
      const rn = r ? (new Intl.DisplayNames(["en"], { type: "region" }).of(r) || r) : "";
      return rn ? `${ln} (${rn})` : ln;
    } catch { return loc; }
  }
  // Locale of the currently selected narrator voice = the film's language.
  const curLoc = localeOf(voice);
  // Every language present in the loaded voice catalogue (common ones first).
  const LANGUAGES = useMemo(() => {
    const seen = new Map();
    voices.forEach(v => { const loc = v.locale; if (loc && !seen.has(loc)) seen.set(loc, langLabel(loc)); });
    if (!seen.size) seen.set("en-US", "English (United States)");
    const order = ["en-US", "en-IN", "hi-IN", "bn-IN"];
    return [...seen.entries()].sort((a, b) => {
      const ia = order.indexOf(a[0]), ib = order.indexOf(b[0]);
      if (ia >= 0 || ib >= 0) return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
      return a[1].localeCompare(b[1]);
    }).map(([code, label]) => ({ code, label }));
  }, [voices]);
  // The voices that speak the selected language — narration AND dialogue come from here,
  // so nothing is ever voiced in the wrong language.
  const langVoices = useMemo(() => {
    const inLoc = voices.filter(v => v.locale === curLoc);
    return inLoc.length ? inLoc : voices;
  }, [voices, curLoc]);
  // Switch the whole film to a language: default the narrator to a natural voice in that
  // locale and clear per-character voices so they get re-picked in the new language.
  // Rank Azure voices by naturalness so we default to the best ones: the newest high-fidelity
  // voices (…:MAI-Voice-2 for Hindi etc.) > DragonHD > Multilingual > older standard voices.
  function voiceRank(v) {
    const sn = (v && v.shortName) || "";
    if (/:MAI-Voice/i.test(sn)) return 0;
    if (/DragonHD/i.test(sn)) return 1;
    if (/Multilingual/i.test(sn)) return 2;
    return 3;
  }
  function pickLanguage(loc) {
    const inLoc = voices.filter(v => v.locale === loc).slice().sort((a, b) => voiceRank(a) - voiceRank(b));
    // gender is normalized to lowercase on load; prefer the best-ranked female narrator, else best.
    const pref = inLoc.find(v => v.gender === "female") || inLoc[0];
    if (pref) setVoice(pref.shortName);
    setScDialogVoice("");
    voiceSuggestStoryRef.current = null;
    setScCast(prev => (prev || []).map(c => ({ ...c, voice: "" })));

  // Wan2.2 can take a while per clip. Start with longer poll intervals
  // to avoid wasting round trips, then tighten as render approaches completion.
  // Bails out promptly if cancelRef is set (and tells backend to cancel server-side).
  async function poll(id, onProgress) {
    currentJobIdRef.current = id;
    let elapsed = 0;
    try {
      let transientFails = 0;
      while (true) {
        if (cancelRef.current) throw new Error("Cancelled by user");
        const wait = elapsed < 60_000 ? 6000 : elapsed < 120_000 ? 4000 : 3000;
        await sleep(wait);
        elapsed += wait;
        if (cancelRef.current) throw new Error("Cancelled by user");
        const r = await fetch(`/api/jobs/${id}`);
        // Tolerate transient upstream 5xx / 429 — the underlying
        // render job is still alive, just the status endpoint hiccuped.
        // Bail only after several consecutive failures.
        if (r.status === 429 || (r.status >= 500 && r.status <= 599)) {
          transientFails++;
          dbg("warn", `transient ${r.status} on /api/jobs/${id} (fail ${transientFails}/6) — keep polling`);
          if (transientFails >= 6) {
            const tx = await r.text().catch(() => "");
            throw new Error(`Status endpoint returned ${r.status} 6× in a row: ${tx.slice(0, 240)}`);
          }
          continue;
        }
        transientFails = 0;
        const j = await jsonOrThrow(r);
        const st = j.status;
        if (onProgress) onProgress(st, elapsed);
        else setStatus(s => ({ ...s, label: st }));
        if (st === "succeeded" || st === "completed") return j;
        if (st === "failed" || st === "cancelled") throw new Error("Job " + st);
      }
    } finally {
      currentJobIdRef.current = null;
    }
  }

  // User-initiated cancellation. Sets the cancel flag, tells backend to stop the

  async function cancelRun() {

    setStatus(s => ({ ...s, label: "cancelling…" }));
    const id = currentJobIdRef.current;

      try {
        await fetch(`/api/jobs/${encodeURIComponent(id)}/cancel`, { method: "POST" });
        dbg("info", `cancel signal sent for ${id}`);
      } catch (e) {
        dbg("warn", `failed to signal cancel: ${e.message}`);
      }
    }
    toast("Cancelling generation…");
  }

  // The storyboard writes the whole script + narration in THIS language so the spoken
  // audio and the on-screen story share one language and stay in sync.
  function voiceLanguage(v) {
    try {
      const sub = String(v || "en-US").split("-")[0];

      return name || "English";

  // Step 1: turn the idea into a story spread over N=ceil(total/5) clips.
  async function buildStoryboard() {
    if (!scPrompt.trim()) { toast("Enter a story idea first.", true); return; }
    // Pre-warm the scale-to-zero GPU NOW (fire-and-forget): it wakes the container and loads
    // the cast models while the user reviews the story, sets up cast and submits — so the
    // render starts casting on a hot GPU instead of waiting out the cold start.
    fetch("/api/gpu-warm", { method: "POST" }).catch(() => {});
    const narrating = scNarrationMode !== "off";
    setScBuilding(true); setScStory(null); setScProgress([]); setScCast([]);
    try {
      const r = await fetch("/api/storyboard", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: scPrompt, totalSeconds: scTotalSec, clipSeconds: 5, size: scSize, narrate: narrating, language: narrating ? voiceLanguage(voice) : "English", dialogDirection: narrating ? scDialogPrompt : "" })
      });
      const j = await jsonOrThrow(r);
      const story = j.story || {};
      if (!Array.isArray(story.clips) || story.clips.length === 0) throw new Error("storyboard had no clips");
      setScStory(story);
      // Seed the editable cast from the story so the user can review it, swap in
      // templates, edit descriptions and assign a per-character voice BEFORE casting.

      toast(`Storyboard ready — ${story.clips.length} clips telling one story`);

  // Submit an I2V job, tolerating GPU cold-start (503 warming) and rate limits.
  async function submitI2V(startImage, thePrompt, clipSec, label) {
    for (let attempt = 0; attempt < 40; attempt++) {
      if (cancelRef.current) throw new Error("Cancelled by user");
      const fd = new FormData();
      fd.append("prompt", thePrompt);
      fd.append("seconds", String(clipSec));
      fd.append("size", scSize);
      fd.append("startImage", startImage);
      const r = await fetch("/api/jobs", { method: "POST", body: fd });
      const txt = await r.text();
      if (r.ok) return JSON.parse(txt);
      let warming = false;
      try { warming = !!JSON.parse(txt).warming; } catch {}
      if (r.status === 503 && (warming || /warming|starting up|cold start/i.test(txt))) {
        setStatus(s => ({ ...s, label: `${label}: GPU warming up… (try ${attempt + 1})` }));
        dbg("warn", `${label}: GPU cold-starting (503 warming), retrying in 15s`);
        await sleep(15000); continue;
      }
      if (r.status === 429 || /Too many running tasks/i.test(txt)) { await sleep(5000 + attempt * 2000); continue; }
      throw new Error(txt.slice(0, 400));
    }
    throw new Error("GPU did not become ready after several minutes — try again.");
  }

  // ── Audio Lab helpers ───────────────────────────────────────────────────────
  // The Indian languages previewed side by side (only those present in the catalogue).
  function alLanguages() {
    const have = new Set(voices.map(v => v.locale));
    const list = ["en-IN", "hi-IN", "bn-IN"].filter(l => have.has(l));
    return list.length ? list : ["en-US"];
  }
  // Most natural voice in a locale, honouring the user's per-language override.
  function alVoiceFor(loc) {
    const override = alVoiceSel[loc];
    if (override && voices.some(v => v.shortName === override)) return override;
    const inLoc = voices.filter(v => v.locale === loc).slice().sort((a, b) => voiceRank(a) - voiceRank(b));
    const pref = inLoc.find(v => v.gender === "female") || inLoc[0];
    return pref ? pref.shortName : "en-US-AvaMultilingualNeural";
  }
  // Real spoken duration of an audio clip, read from the browser's media metadata.
  function measureAudio(url) {
    return new Promise(resolve => {
      const a = new Audio();
      a.preload = "metadata";
      const done = d => resolve(Number.isFinite(d) && d > 0 ? d : 0);
      a.onloadedmetadata = () => done(a.duration);
      a.onerror = () => done(0);
      a.src = url;
    });
  }
  function alLines() { return alScript.split("\n").map(s => s.trim()).filter(Boolean); }
  // Synthesize every line in one language's voice, measure each, then stitch ONE continuous
  // track — exactly how the real film plays its narration.
  async function previewLanguage(loc) {
    const lines = alLines();
    if (!lines.length) { toast("Write a few narration lines first.", true); return; }
    const vname = alVoiceFor(loc);
    setAlResults(prev => ({ ...prev, [loc]: { voice: vname, busy: true, lines: [], error: null } }));
    try {
      const synth = await Promise.all(lines.map(async (text) => {
        const r = await fetch("/api/narrate", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, voice: vname })
        });
        const j = await jsonOrThrow(r);
        const dur = await measureAudio(j.url);
        return { text, url: j.url, dur, translated: j.translated || null };
      }));
      let wholeUrl = synth.length ? synth[0].url : null;
      if (synth.length > 1) {
        const cr = await fetch("/api/concat-audio", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ audioUrls: synth.map(s => s.url), gapMs: 320 })
        });
        wholeUrl = (await jsonOrThrow(cr)).url;
      }
      const totalDur = synth.reduce((a, s) => a + s.dur, 0) + Math.max(0, synth.length - 1) * 0.32;
      setAlResults(prev => ({ ...prev, [loc]: { voice: vname, busy: false, lines: synth, wholeUrl, totalDur, error: null } }));
      dbg("ok", `audio preview ${loc} (${vname}) ready`);
    } catch (e) {
      setAlResults(prev => ({ ...prev, [loc]: { voice: vname, busy: false, lines: [], error: (e.message || "failed").slice(0, 200) } }));
      toast(`Preview failed for ${loc}: ${(e.message || "").slice(0, 140)}`, true);
    }
  }
  async function previewAllIndian() {
    setAlBusy(true);
    try { for (const loc of alLanguages()) await previewLanguage(loc); }
    finally { setAlBusy(false); }
  }
  function playWhole(url) {
    if (!url) return;
    try { if (alAudioRef.current) alAudioRef.current.pause(); const a = new Audio(url); alAudioRef.current = a; a.play(); } catch {}
  }
  // Instant, offline writing tips: flag lines too long to speak inside one cut.
  function alSuggestions() {
    const lines = alLines();
    const budget = Math.round(alClipSec * 2.6); // speakable words per cut (~155 wpm)
    const out = [];
    lines.forEach((ln, i) => {
      const w = ln.split(/\s+/).filter(Boolean).length;
      if (w > budget + 3) out.push({ clip: i + 1, kind: "long", msg: `Clip ${i + 1}: ${w} words — trim to about ${budget} so it fits a ${alClipSec}s cut without slowing the video.` });
    });
    if (!lines.length) out.push({ clip: 0, kind: "ok", msg: "Add a line for each shot to preview the narration." });
    else if (!out.length) out.push({ clip: 0, kind: "ok", msg: `Every line fits a ${alClipSec}s cut (about ${budget} words). Nicely paced.` });
    return out;
  }

  // ── Wan-Animate helpers (character image + sample video → animated clip, via the gated GPU endpoints) ──
  function pickAnImage(file) {
    if (anImagePreview) { try { URL.revokeObjectURL(anImagePreview); } catch {} }
    setAnImage(file || null);
    setAnImagePreview(file ? URL.createObjectURL(file) : null);
  }
  function pickAnVideo(file) {
    if (anVideoPreview) { try { URL.revokeObjectURL(anVideoPreview); } catch {} }
    setAnVideo(file || null);
    setAnVideoPreview(file ? URL.createObjectURL(file) : null);
    if (file) setAnYoutubeUrl(""); // file upload clears the URL input
  }
  async function downloadReferenceVideo() {
    if (!anYoutubeUrl.trim()) return;
    setAnDownloadBusy(true);
    try {
      const r = await fetch("/api/download-reference-video", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: anYoutubeUrl.trim(), seconds: anSeconds })
      });
      const j = await jsonOrThrow(r);
      // Store the blob URL as a special "File-like" marker — we'll send videoUrl to animate-submit.
      setAnVideo({ _blobUrl: j.url, name: "reference.mp4" });
      setAnVideoPreview(j.url);
      toast("✓ Reference video downloaded (" + (j.bytes/1024/1024).toFixed(1) + " MB)");
    } catch (e) { toast("❌ Download failed: " + e.message.slice(0, 160), true); }
    finally { setAnDownloadBusy(false); }
  }
  function cancelAnimate() { anCancelRef.current = true; setAnBusy(false); setAnStatus(""); }
  async function submitAnimate() {
    if (!anImage) { toast("Add a character image first.", true); return; }
    if (!anVideo) { toast("Add a sample / driving video (or paste a YouTube URL) first.", true); return; }
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    setAnBusy(true); setAnError(""); setAnResult(null); anCancelRef.current = false;
    setAnStatus("Waking the GPU…");
    try {
      // Pre-warm the scale-to-zero A100 so the first submit lands on a hot container.
      try { await fetch("/api/gpu/start", { method: "POST" }); } catch {}
      const fd = new FormData();
      fd.append("image", anImage);
      // anVideo is either a real File (upload) or { _blobUrl } (downloaded from URL)
      if (anVideo._blobUrl) {
        fd.append("videoUrl", anVideo._blobUrl); // server downloads from blob
      } else {
        fd.append("video", anVideo);
      }
      fd.append("prompt", anPrompt || "");
      fd.append("size", scSize);
      fd.append("seconds", String(anSeconds));
      let id = null;
      for (let attempt = 0; attempt < 40 && !id; attempt++) {
        if (anCancelRef.current) throw new Error("Cancelled");
        setAnStatus(attempt ? `Submitting… (GPU warming, retry ${attempt})` : "Submitting…");
        const r = await fetch("/api/animate-submit", { method: "POST", body: fd });
        if (r.status === 501) { setAnError("Wan-Animate isn't activated on the server yet — stage the weights (wan22/download-wan-animate.sh), set WAN_ANIMATE_ENABLED=1, then restart."); return; }
        if (r.status === 503) { await sleep(15000); continue; }
        id = (await jsonOrThrow(r)).id;
      }
      if (!id) throw new Error("The GPU never became ready to accept the job.");
      setAnStatus("Rendering on the A100… (a few minutes)");
      let gotUrl = null;
      for (let attempt = 0; attempt < 100 && !gotUrl; attempt++) {
        if (anCancelRef.current) throw new Error("Cancelled");
        await sleep(6000);
        const r = await fetch(`/api/animate-status/${encodeURIComponent(id)}`);
        if (r.status === 503) { setAnStatus("GPU warming…"); continue; }
        const j = await jsonOrThrow(r);
        if (j.status === "succeeded" && j.url) { gotUrl = j.url; break; }
        if (j.status === "failed") throw new Error(j.error || "render failed in ComfyUI");
        setAnStatus(`Rendering…${j.progress ? " " + j.progress + "%" : ""}`);
      }
      if (gotUrl) { setAnResult({ url: gotUrl }); dbg("ok", "wan-animate done"); }
      else throw new Error("Timed out waiting for the render.");
    } catch (e) {
      if (!anCancelRef.current) setAnError((e.message || "failed").slice(0, 200));
    } finally { setAnBusy(false); setAnStatus(""); }
  }

  // ── Sound step helpers ───────────────────────────────────────────────────────
  // Map mood to the same Azure express-as styles the backend uses (mirrors MoodToStyle in C#).
  function moodStyle(mood) {
    if (!mood) return "";
    const m = mood.toLowerCase();
    if (/sad|grief|sorrow|mourn|melanch|lonel|heartbreak|loss|tear/.test(m)) return "sad";
    if (/bittersweet|wistful|nostalg|longing|yearn|tender|gentle|warm|fond|intimate/.test(m)) return "gentle";
    if (/hopeful|uplift|promis|bright|dawn/.test(m)) return "hopeful";
    if (/cheerful|playful|light|joyful|whims|happy|celebr/.test(m)) return "cheerful";
    if (/excit|thrill|elat|intense|passionate|burst/.test(m)) return "excited";
    if (/affect|care|nurtur|protect|mother/.test(m)) return "affectionate";
    if (/calm|peaceful|still|serene|tranquil|slow/.test(m)) return "calm";
    if (/whisper|mutter|hush|quiet|breathe/.test(m)) return "whispering";
    if (/fear|dread|terr|horr|panic/.test(m)) return "fearful";
    if (/angry|rage|furious|outrage/.test(m)) return "angry";
    if (/serious|solemn|grave|stern/.test(m)) return "serious";
    return "";
  }
  // Synthesize audio for one clip (using voice overrides when given) and store in scClipAudio.
  async function synthClipAudio(i, nVoice, dVoice) {
    const clip = (scStory?.clips || [])[i];
    if (!clip) return;
    const nLine = (clip.narration || "").trim();
    const dLine = (clip.dialog || "").trim();
    if (!nLine && !dLine) return;
    const style = moodStyle(clip.mood || "");
    setScClipAudio(prev => prev.map((c, idx) => idx === i ? {...c, busy: true, error: null} : c));
    try {
      const tracks = [];
      if (nLine) {
        const r = await fetch("/api/narrate", { method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ text: nLine, voice: nVoice || voice, style }) });
        tracks.push((await jsonOrThrow(r)).url);
      }
      if (dLine) {
        const speakerId = clip.speaker || (Array.isArray(clip.characters) && clip.characters.length === 1 ? clip.characters[0] : "");
        const dv = (speakerId && scCast?.find(c => c.id === speakerId)?.voice) || dVoice || scDialogVoice || voice;
        const r = await fetch("/api/narrate", { method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ text: dLine, voice: dv, style }) });
        tracks.push((await jsonOrThrow(r)).url);
      }
      let url = tracks[0] || null;
      if (tracks.length > 1) {
        const r = await fetch("/api/concat-audio", { method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ audioUrls: tracks, gapMs: 200 }) });
        url = (await jsonOrThrow(r)).url;
      }
      const dur = url ? await measureAudio(url) : 0;
      setScClipAudio(prev => prev.map((c, idx) => idx === i ? {...c, url, dur, busy: false, error: null} : c));
    } catch (e) {
      if (e.message !== "Cancelled") setScClipAudio(prev => prev.map((c, idx) => idx === i ? {...c, busy: false, error: e.message.slice(0,120)} : c));
    }
  }
  async function synthAllSoundClips() {
    if (!scStory) return;
    const clips = scStory.clips || [];
    setSoundBusy(true);
    // Ensure a slot exists for every clip
    setScClipAudio(clips.map((_, i) => scClipAudio.find(c => c.index === i) || {index: i, url: null, dur: 0, busy: false, error: null}));
    try {
      for (let i = 0; i < clips.length; i++) {
        const existing = scClipAudio.find ? scClipAudio.find(c => c.index === i) : null;
        if (existing?.url) continue; // already approved
        await synthClipAudio(i);
      }
    } finally { setSoundBusy(false); }
  }
  async function previewWholeSoundtrack() {

      toast("▶ Playing whole narration");

    finally { setSoundPreviewBusy(false); }
  }
